<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>调音器诊断 v2</title>
<style>
body{font-family:monospace;background:#000;color:#0f0;padding:16px;max-width:500px;margin:0 auto;font-size:15px}
h1{font-size:18px;text-align:center;margin-bottom:10px;color:#0ff}
.btn{display:block;width:100%;padding:14px;font-size:18px;background:#e84;color:#fff;border:none;border-radius:12px;margin:10px 0;cursor:pointer}
.btn.on{background:#e33}
.log{padding:8px;background:#111;border-radius:6px;margin:4px 0;font-size:13px;word-break:break-all}
.log .l{color:#4c4}
.log .v{color:#ff0}
hr{border-color:#333;margin:12px 0}
</style>
</head>
<body>
<h1>🔬 调音器诊断 v2 — 音频轨道层检查</h1>

<button class="btn" id="btn" onclick="toggle()">🎤 开始监听</button>

<div id="logs">
  <div class="log"><span class="l">等待启动…</span></div>
</div>

<script>
let ctx=null, analyser=null, scriptNode=null, stream=null, running=false;
let tickCount=0, nonZeroCount=0;

function log(label, value) {
  const d=document.getElementById('logs');
  const div=document.createElement('div');
  div.className='log';
  div.innerHTML='<span class="l">'+label+'</span> <span class="v">'+value+'</span>';
  d.insertBefore(div, d.firstChild);
  if(d.children.length>30) d.removeChild(d.lastChild);
}

async function toggle() {
  if(running){
    running=false;
    if(scriptNode){scriptNode.disconnect();scriptNode=null;}
    if(ctx){ctx.close();ctx=null;analyser=null;}
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
    document.getElementById('btn').textContent='🎤 开始监听';
    document.getElementById('btn').classList.remove('on');
    log('⏹','已停止');
    return;
  }

  try {
    // === STEP 1: Check if getUserMedia is supported ===
    log('📡','检查 navigator.mediaDevices…');
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      log('❌ FATAL','getUserMedia 不可用！这个浏览器不支持');
      return;
    }
    log('✅','getUserMedia 可用');

    // === STEP 2: Enumerate devices ===
    log('📋','枚举音频设备…');
    const devices=await navigator.mediaDevices.enumerateDevices();
    const audioInputs=devices.filter(d=>d.kind==='audioinput');
    log('🎙 发现音频输入设备',audioInputs.length+' 个');
    audioInputs.forEach(d=>log('  📱',d.label||'(无标签) — '+d.deviceId.slice(0,8)+'…'));

    // === STEP 3: Get mic stream ===
    log('🎤','请求麦克风 (audio:true)…');
    stream=await navigator.mediaDevices.getUserMedia({audio:true});
    log('✅','getUserMedia 成功');

    // === STEP 4: Check track status ===
    const tracks=stream.getAudioTracks();
    log('🎵 音频轨道数',tracks.length);
    tracks.forEach(t=>{
      log('  轨道',t.label);
      log('    enabled',t.enabled);
      log('    muted',t.muted);
      log('    readyState',t.readyState);
      log('    constraints',JSON.stringify(t.getConstraints()));
      log('    settings',JSON.stringify(t.getSettings()));
    });

    if(tracks.length===0){
      log('❌ FATAL','没有音频轨道！');
      return;
    }

    // === STEP 5: Create AudioContext ===
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    log('🔊 AudioContext 创建','sampleRate='+ctx.sampleRate+'Hz, state='+ctx.state);

    if(ctx.state==='suspended'){
      log('⏳','正在 resume…');
      await ctx.resume();
      log('✅','resume 完成, state='+ctx.state);
    }

    // === STEP 6: Create script processor (alternative to analyser) ===
    const src=ctx.createMediaStreamSource(stream);
    analyser=ctx.createAnalyser();
    analyser.fftSize=2048;

    // ScriptProcessorNode: directly processes audio — works even if AnalyserNode doesn't
    scriptNode=ctx.createScriptProcessor(2048,1,1);
    scriptNode.onaudioprocess=function(e){
      tickCount++;
      const buf=e.inputBuffer.getChannelData(0);
      let max=0, sum=0;
      for(let i=0;i<buf.length;i++){
        const a=Math.abs(buf[i]);
        sum+=a;
        if(a>max)max=a;
      }
      if(max>0.0001) nonZeroCount++;

      // Update every 30 ticks
      if(tickCount%30===0){
        document.getElementById('btn').textContent='⏹ 停止 (tick:'+tickCount+' nz:'+nonZeroCount+')';
      }
    };

    // Connect: src → analyser → scriptNode → silentGain → destination
    src.connect(analyser);
    analyser.connect(scriptNode);
    const silentGain=ctx.createGain();
    silentGain.gain.value=0;
    scriptNode.connect(silentGain);
    silentGain.connect(ctx.destination);

    log('🔗','音频链: mic→analyser→scriptNode→silentGain→dest');

    running=true;
    document.getElementById('btn').textContent='⏹ 停止';
    document.getElementById('btn').classList.add('on');

    // === STEP 7: Start reading ===
    tickCount=0; nonZeroCount=0;
    readAnalyser();
  } catch(e) {
    log('❌ 异常',e.name+': '+e.message);
  }
}

function readAnalyser(){
  if(!running) return;

  const buf=new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);

  let max=0, rms=0;
  for(let i=0;i<buf.length;i++){ const v=Math.abs(buf[i]); rms+=buf[i]*buf[i]; if(v>max)max=v; }
  rms=Math.sqrt(rms/buf.length);

  tickCount++;
  if(max>0) nonZeroCount++;

  // Update display every 15 frames
  if(tickCount%15===0){
    const rmsDb=rms>1e-10?(20*Math.log10(rms)).toFixed(1):'-∞';
    log('📊 帧#'+tickCount,
      'RMS='+rmsDb+'dB peak='+max.toFixed(4)+' nzFrames='+nonZeroCount+'/'+tickCount+' state='+(ctx?ctx.state:'?'));
  }

  requestAnimationFrame(readAnalyser);
}
</script>
</body>
</html>
