<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>调音器诊断</title>
<style>
body{font-family:monospace;background:#111;color:#0f0;padding:20px;max-width:500px;margin:0 auto;font-size:16px}
h1{font-size:20px;text-align:center;margin-bottom:16px}
.metric{margin:6px 0;padding:6px;background:#1a1a1a;border-radius:4px;display:flex;justify-content:space-between}
.metric .val{color:#ff0;font-weight:bold}
.big{font-size:32px;text-align:center;margin:12px 0;color:#0ff}
.btn{display:block;width:100%;padding:16px;font-size:20px;background:#4F8CFF;color:#fff;border:none;border-radius:12px;margin:16px 0;cursor:pointer}
.btn.on{background:#ef4444}
#status{text-align:center;margin:8px 0;font-size:14px}
.warn{color:#f80}
.good{color:#0f0}
</style>
</head>
<body>
<h1>🔬 调音器诊断工具</h1>

<button class="btn" id="btn" onclick="toggle()">🎤 开始监听</button>
<div id="status"></div>

<div class="metric"><span>RMS (原始音量)</span><span class="val" id="rmsVal">-</span></div>
<div class="metric"><span>RMS dB</span><span class="val" id="rmsDbVal">-</span></div>
<div class="metric"><span>自相关质量</span><span class="val" id="corrVal">-</span></div>
<div class="metric"><span>检测频率</span><span class="val" id="freqVal">-</span></div>
<div class="metric"><span>最近音符</span><span class="val" id="noteVal">-</span></div>
<div class="metric"><span>音分偏差</span><span class="val" id="centVal">-</span></div>
<div class="metric"><span>自相关延迟(lag)</span><span class="val" id="lagVal">-</span></div>

<div class="big" id="bigNote">🎵</div>

<hr style="border-color:#333;margin:16px 0">
<p style="font-size:13px;color:#888">
📋 使用方法:<br>
1. 点击按钮 → 允许麦克风<br>
2. 保持安静 → 记录各项数值<br>
3. 弹琴弦 → 看 RMS 和频率是否变化<br>
4. 截图发给我
</p>

<script>
let ctx=null, analyser=null, running=false;

async function toggle() {
    if (running) {
        running=false;
        if(ctx){ctx.close();ctx=null;analyser=null;}
        document.getElementById('btn').textContent='🎤 开始监听';
        document.getElementById('btn').classList.remove('on');
        document.getElementById('status').textContent='';
        return;
    }
    try {
        document.getElementById('status').textContent='正在请求麦克风权限…';
        document.getElementById('status').className='';

        // TEST 1: simplest possible constraints
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});

        document.getElementById('status').textContent='✅ 麦克风已连接，开始监听';
        document.getElementById('status').className='good';

        ctx = new (window.AudioContext||window.webkitAudioContext)();
        document.getElementById('status').textContent+=' | AudioCtx: '+ctx.sampleRate+'Hz';
        if (ctx.state==='suspended') {
            await ctx.resume();
            document.getElementById('status').textContent+=' | resumed';
        }
        document.getElementById('status').textContent+=' | state:'+ctx.state;

        const src = ctx.createMediaStreamSource(stream);
        analyser = ctx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.3;
        src.connect(analyser);
        // No bandpass filters — raw mic input for diagnosis

        running = true;
        document.getElementById('btn').textContent = '⏹ 停止';
        document.getElementById('btn').classList.add('on');
        tick();
    } catch(e) {
        document.getElementById('status').textContent = '❌ 错误: '+e.message;
        document.getElementById('status').className = 'warn';
        console.error(e);
    }
}

function detectPitch(buf) {
    const n=buf.length, sr=ctx.sampleRate;
    const minLag=Math.floor(sr/1500);
    const maxLag=Math.floor(sr/60);
    if (maxLag>=n) return {freq:-1, rms:0, corr:0, lag:0};

    let r0=0;
    for(let i=0;i<n;i++) r0+=buf[i]*buf[i];
    const rms=Math.sqrt(r0/n);

    // Find best lag with autocorrelation — NO GATES, raw detection
    let bestLag=-1, bestVal=0;
    for(let lag=minLag;lag<maxLag;lag++){
        let r=0;
        for(let i=0;i<n-lag;i++) r+=buf[i]*buf[i+lag];
        if(r>bestVal){bestVal=r;bestLag=lag;}
    }
    const corr = r0>1e-12 ? bestVal/r0 : 0;
    const freq = bestLag>0 ? sr/bestLag : -1;
    return {freq, rms, corr, lag:bestLag};
}

function tick() {
    if(!running) return;
    const buf = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buf);
    const r = detectPitch(buf);

    document.getElementById('rmsVal').textContent = r.rms.toFixed(6);
    const rmsDb = r.rms>1e-10 ? (20*Math.log10(r.rms)).toFixed(1) : '-∞';
    document.getElementById('rmsDbVal').textContent = rmsDb+' dB';
    document.getElementById('corrVal').textContent = (r.corr*100).toFixed(1)+'%';
    document.getElementById('freqVal').textContent = r.freq>0 ? r.freq.toFixed(2)+' Hz' : '未检测到';
    document.getElementById('lagVal').textContent = r.lag;

    if (r.freq>40&&r.freq<2000) {
        const midi = 69+12*Math.log2(r.freq/440);
        const mr = Math.round(midi);
        const cents = 100*(midi-mr);
        const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const noteName = NOTES[((mr%12)+12)%12]+Math.floor(mr/12)-1;
        document.getElementById('noteVal').textContent = noteName;
        document.getElementById('centVal').textContent = cents.toFixed(0)+'¢';
        document.getElementById('bigNote').textContent = noteName.slice(0,-1)+' '+noteName.slice(-1);
    } else {
        document.getElementById('noteVal').textContent = '--';
        document.getElementById('centVal').textContent = '--';
    }

    requestAnimationFrame(tick);
}
</script>
</body>
</html>
