        .mode-chip.active { background: #4F8CFF; border-color: #4F8CFF; color: #fff; box-shadow: 0 2px 14px rgba(79,140,255,.35); }

    <script>
    // ===== DATA =====
    const NOTES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
    const TUNINGS = {
        chromatic: { name:'半音阶', strings:null },
        guitar:    { name:'吉他',     strings:['E2','A2','D3','G3','B3','E4'], labels:['⑥','⑤','④','③','②','①'] },
        ukulele:   { name:'尤克里里', strings:['G4','C4','E4','A4'], labels:['④','③','②','①'] },
        bass:      { name:'贝斯',     strings:['E1','A1','D2','G2'], labels:['④','③','②','①'] },
        violin:    { name:'小提琴',   strings:['G3','D4','A4','E5'], labels:['④','③','②','①'] }
    };

    function parseNote(s) {
        const m = s.match(/^([A-G][♯#♭b]?)(\d)$/);
        if (!m) return null;
        let n = m[1].replace('#','♯').replace('b','♭');
        const oct = parseInt(m[2]);
        const semi = NOTES.indexOf(n);
        if (semi === -1) return null;
        const midi = semi + (oct+1)*12;
        return { name:n, oct, midi, freq: 440*Math.pow(2,(midi-69)/12) };
    }

    function midiToNote(m) {
        const s = Math.round(m) % 12, o = Math.floor(Math.round(m)/12)-1;
        return { name:NOTES[s], oct:o, freq:440*Math.pow(2,(m-69)/12) };
    }

    // ===== DRAW TICKS =====
    const CX=220, CY=236, R=172;
    (function(){
        const g = document.getElementById('tickGroup');
        for (let i=-50; i<=50; i+=5) {
            const angle = (-90 + i*1.6) * Math.PI/180; // spread 80° each side
            const inner = 162, outer = i%10===0 ? 178 : 170;
            const x1 = CX+inner*Math.cos(angle), y1 = CY+inner*Math.sin(angle);
            const x2 = CX+outer*Math.cos(angle), y2 = CY+outer*Math.sin(angle);
            const line = document.createElementNS('http://www.w3.org/2000/svg','line');
            line.setAttribute('x1',x1); line.setAttribute('y1',y1);
            line.setAttribute('x2',x2); line.setAttribute('y2',y2);
            line.setAttribute('stroke', i===0?'#333':(i%10===0?'#666':'#bbb'));
            line.setAttribute('stroke-width', i===0?'2.5':(i%10===0?'1.5':'.9'));
            line.setAttribute('stroke-linecap','round');
            g.appendChild(line);
            // Major labels
            if (i%10===0 && i!==0) {
                const lx = CX+(outer+16)*Math.cos(angle), ly = CY+(outer+16)*Math.sin(angle);
                const t = document.createElementNS('http://www.w3.org/2000/svg','text');
                t.setAttribute('x',lx); t.setAttribute('y',ly);
                t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','central');
                t.setAttribute('font-size','11'); t.setAttribute('fill','#555'); t.setAttribute('font-weight','600');
                t.textContent = i>0?'+'+i:i;
                g.appendChild(t);
            }
        }
    })();

    // ===== AUDIO ENGINE (v4 — pitchy MPM pitch detection) =====
    let ctx=null, analyser=null, bandpassLP=null, bandpassHP=null, running=false, mode='guitar';
    let detector=null; // pitchy PitchDetector instance
    let smoothedHz=null;
    let smoothedCents=0;
    let lastDetectionTime=0;
    let pitchHistory = [];
    const HISTORY_SIZE = 3;
    const HOLD_MS = 1500;
    const CLARITY_THRESHOLD = 0.85; // pitchy built-in noise rejection

    function getBandpassRange(m) {
        switch(m) {
            case 'bass':    return {low:35, high:500};
            case 'violin':  return {low:180, high:2500};
            case 'ukulele': return {low:180, high:1200};
            case 'guitar':
            default:        return {low:50, high:1500};
        }
    }

    async function toggleTuner() {
        if (running) { stopTuner(); return; }
        try {
            // iOS: AudioContext BEFORE getUserMedia
            ctx = new (window.AudioContext||window.webkitAudioContext)();
            if (ctx.state === 'suspended') { await ctx.resume(); }

            // Load pitchy dynamically (ESM)
            if (!detector) {
                const mod = await import('https://esm.sh/pitchy@4.1.0');
                detector = mod.PitchDetector.forFloat32Array(4096); // matches analyser.fftSize
                // Note: 4096 gives best accuracy for McLeod Pitch Method
            }

            const stream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
            });
            const src = ctx.createMediaStreamSource(stream);

            const range = getBandpassRange(mode);
            bandpassHP = ctx.createBiquadFilter();
            bandpassHP.type = 'highpass';
            bandpassHP.frequency.value = range.low;
            bandpassHP.Q.value = 0.7;

            bandpassLP = ctx.createBiquadFilter();
            bandpassLP.type = 'lowpass';
            bandpassLP.frequency.value = range.high;
            bandpassLP.Q.value = 0.7;

            analyser = ctx.createAnalyser();
            analyser.fftSize = 4096;
            analyser.smoothingTimeConstant = 0.2;

            // Low-shelf boost: phone mics lose sensitivity below 100Hz.
            // 6th string E2 = 82Hz falls in this dead zone. +8dB below 200Hz compensates.
            const lowBoost = ctx.createBiquadFilter();
            lowBoost.type = 'lowshelf';
            lowBoost.frequency.value = 200;
            lowBoost.gain.value = 8;

            src.connect(bandpassHP);
            bandpassHP.connect(bandpassLP);
            bandpassLP.connect(lowBoost);
            lowBoost.connect(analyser);
            const silentGain = ctx.createGain();
            silentGain.gain.value = 0;
            analyser.connect(silentGain);
            silentGain.connect(ctx.destination);

            running = true;
            pitchHistory = [];
            smoothedHz = null;
            smoothedCents = 0;
            lastDetectionTime = 0;

            document.getElementById('powerIcon').textContent = '⏹';
            document.getElementById('powerBtn').classList.add('on');
            document.getElementById('hintText').textContent = '正在监听…请弹奏一个音';
            tick();
        } catch(e) {
            document.getElementById('hintText').textContent = '⚠ 无法访问麦克风，请检查权限';
            console.error(e);
        }
    }

    function stopTuner() {
        running = false;
        smoothedHz = null; smoothedCents = 0; pitchHistory = [];
        if(ctx){ ctx.close(); ctx=null; analyser=null; bandpassLP=null; bandpassHP=null; }
        document.getElementById('debugPanel').style.display = 'none';
        document.getElementById('powerIcon').textContent = '🎤';
        document.getElementById('powerBtn').classList.remove('on');
        document.getElementById('hintText').textContent = '已停止';
        document.getElementById('noteText').textContent = '--';
        document.getElementById('freqLine').textContent = 'A4 = 440 Hz';
        document.getElementById('devText').textContent = '';
        document.getElementById('devText').setAttribute('fill','#555');
        document.getElementById('needle').style.transform = 'rotate(0deg)';
        updateStrings(null);
    }

    function tick() {
        if (!running) return;
        const buf = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buf);
        const now = performance.now();

        // pitchy MPM detection: returns [frequency, clarity]
        const [freq, clarity] = detector.findPitch(buf, ctx.sampleRate);

        // Compute RMS for debug
        let r0 = 0;
        for (let i = 0; i < buf.length; i++) r0 += buf[i] * buf[i];
        const rms = Math.sqrt(r0 / buf.length);

        let gateStatus = '等待信号…';

        if (freq > 30 && freq < 2000 && clarity > CLARITY_THRESHOLD) {
            // Temporal stability check
            pitchHistory.push(freq);
            if (pitchHistory.length > HISTORY_SIZE) pitchHistory.shift();

            let isStable = false;
            if (pitchHistory.length === HISTORY_SIZE) {
                const max = Math.max(...pitchHistory);
                const min = Math.min(...pitchHistory);
                isStable = (max - min) / min < 0.02;
            }

            if (isStable) {
                const medianFreq = [...pitchHistory].sort((a, b) => a - b)[Math.floor(pitchHistory.length / 2)];
                lastDetectionTime = now;
                gateStatus = '🎵 信号锁定 (clarity:' + (clarity * 100).toFixed(0) + '%)';

                if (smoothedHz === null) {
                    smoothedHz = medianFreq;
                } else {
                    smoothedHz = smoothedHz * 0.6 + medianFreq * 0.4;
                }

                const rawMidi = 69 + 12 * Math.log2(smoothedHz / 440);
                const nearestNote = Math.round(rawMidi);
                const centsOff = 100 * (rawMidi - nearestNote);
                smoothedCents = smoothedCents * 0.6 + centsOff * 0.4;

                updateDisplay(midiToNote(nearestNote), smoothedCents, nearestNote);
                updateStrings(nearestNote);
            } else {
                gateStatus = '⏳ 捕获中(' + pitchHistory.length + '/' + HISTORY_SIZE + ') clarity:' + (clarity * 100).toFixed(0) + '%';
            }
        } else if (clarity <= CLARITY_THRESHOLD && freq > 0) {
            gateStatus = '📡 非乐音(clarity:' + (clarity * 100).toFixed(0) + '%)';
        } else if (freq <= 0) {
            gateStatus = '🔇 无信号';
        }

        // Hold display
        if (freq <= 30 || freq >= 2000 || clarity <= CLARITY_THRESHOLD) {
            if (smoothedHz !== null && (now - lastDetectionTime) < HOLD_MS) {
                smoothedCents *= 0.95;
                const rawMidi = 69 + 12 * Math.log2(smoothedHz / 440);
                const nearestNote = Math.round(rawMidi);
                updateDisplay(midiToNote(nearestNote), smoothedCents, nearestNote);
            } else if (smoothedHz !== null) {
                document.getElementById('noteText').textContent = '--';
                document.getElementById('freqLine').textContent = '等待信号…';
                document.getElementById('devText').textContent = '';
                document.getElementById('needle').style.transform = 'rotate(0deg)';
                updateStrings(null);
                smoothedHz = null; smoothedCents = 0; pitchHistory = [];
            }
        }

        // Debug panel
        const rmsDb = rms > 1e-10 ? 20 * Math.log10(rms) : -120;
        document.getElementById('dbRms').textContent = rmsDb.toFixed(1) + ' dB';
        document.getElementById('dbCorr').textContent = (clarity * 100).toFixed(1) + '%';
        document.getElementById('dbPar').textContent = gateStatus;
        document.getElementById('dbFreq').textContent = smoothedHz ? smoothedHz.toFixed(1) + ' Hz' : '--';
        document.getElementById('dbCents').textContent = smoothedHz ? smoothedCents.toFixed(0) + '¢' : '--';
        document.getElementById('dbMusical').textContent = pitchHistory.length;
        document.getElementById('dbNoise').textContent = (freq>0&&clarity>CLARITY_THRESHOLD?'乐音':'噪声');
        document.getElementById('dbRmsDelta').textContent = '-';
        document.getElementById('dbGates').textContent = 'pitchy MPM v4.0';

        requestAnimationFrame(tick);
    }


    function updateDisplay(note,cents,midi) {
        const nEl=document.getElementById('noteText'), fEl=document.getElementById('freqLine');
        const dEl=document.getElementById('devText'), ndl=document.getElementById('needle');

        nEl.textContent=note.name+note.oct;
        fEl.textContent=note.freq.toFixed(1)+' Hz · MIDI '+midi;

        const abs=Math.abs(cents);
        let color, dev, displayCents;

        // === DEAD ZONE: ±2 cents = in tune ===
        // Snaps needle to center for a stable, comfortable reading
        if (abs<2) {
            color='#4ECB71'; dev='✓ 准了';
            displayCents=0;
            nEl.style.filter='url(#softGlow)';
        } else if (abs<5) {
            color='#4ECB71'; dev=(cents>0?'偏高 ↑ ':'偏低 ↓ ')+cents.toFixed(0)+'¢';
            displayCents=cents;
            nEl.style.filter='url(#softGlow)';
        } else if (abs<15) {
            color='#f59e0b'; dev=(cents>0?'偏高 ↑ ':'偏低 ↓ ')+cents.toFixed(0)+'¢';
            displayCents=cents;
            nEl.style.filter='none';
        } else {
            color='#ef4444'; dev=(cents>0?'偏高 ↑ ':'偏低 ↓ ')+cents.toFixed(0)+'¢';
            displayCents=cents;
            nEl.style.filter='none';
        }
        nEl.setAttribute('fill',color);
        dEl.textContent=dev; dEl.setAttribute('fill',color);

        // Needle angle with dead zone compression
        // Within ±2 cents → needle at center
        // Beyond ±2 → linear mapping with slight compression for comfort
        const angle = Math.max(-55, Math.min(55, displayCents*1.0));
        ndl.style.transform='rotate('+angle+'deg)';
    }

    function updateStrings(midi) {
        if (mode==='chromatic') return;
        const dots=document.querySelectorAll('.string-dot');
        dots.forEach((d,i)=>{
            const t=parseNote(TUNINGS[mode].strings[i]);
            d.classList.remove('near','locked');
            if (midi!==null && t && Math.abs(midi-t.midi)<=1) {
                d.classList.add(midi===t.midi?'locked':'near');
            }
        });
    }

    // ===== MODE + STRING PEGS =====
    function buildStrings(m) {
        const row=document.getElementById('stringRow');
        const t=TUNINGS[m];
        row.innerHTML='';
        if (!t.strings){row.style.display='none';return;}
        row.style.display='flex';
        t.strings.forEach((s,i)=>{
            const d=document.createElement('div');
            d.className='string-dot';
            d.title=s+' ('+parseNote(s).freq.toFixed(1)+'Hz)';
            d.innerHTML='<span class="num">'+(t.labels[i]||(i+1))+'</span>'+s.slice(0,-1);
            row.appendChild(d);
        });
    }

    // Update bandpass filter range when mode changes
    function updateBandpassForMode(m) {
        if (!running || !bandpassHP || !bandpassLP) return;
        const range = getBandpassRange(m);
        // Smooth transition of filter cutoff frequencies
        bandpassHP.frequency.setTargetAtTime(range.low, ctx.currentTime, 0.05);
        bandpassLP.frequency.setTargetAtTime(range.high, ctx.currentTime, 0.05);
    }

    function buildRef(m) {
        const h=document.getElementById('refHead'), b=document.getElementById('refBody');
        const ttl=document.getElementById('refTitle');
        h.innerHTML=''; b.innerHTML='';
        if (m==='chromatic') {
            ttl.textContent='📋 半音阶参考频率';
            ['音名','频率','MIDI'].forEach(v=>{const th=document.createElement('th');th.textContent=v;th.style.cssText='padding:12px 16px;text-align:center;border-bottom:2px solid var(--card-border);color:var(--text-secondary);font-size:14px;font-weight:700';h.appendChild(th);});
            for (let mi=60;mi<=71;mi++) {
                const n=midiToNote(mi);
                const tr=document.createElement('tr');
                ['<b style="font-size:16px">'+n.name+'</b> '+n.oct, n.freq.toFixed(2)+' Hz', mi].forEach((v,i)=>{
                    const td=document.createElement('td');td.innerHTML=v;td.style.cssText='padding:12px 16px;text-align:center;border-bottom:1px solid var(--card-border);color:var(--text);font-size:15px';tr.appendChild(td);
                });
                b.appendChild(tr);
            }
        } else {
            const t=TUNINGS[m];
            ttl.textContent='📋 '+t.name+' 标准定弦';
            ['弦序','音名','频率 (Hz)','MIDI'].forEach(v=>{const th=document.createElement('th');th.textContent=v;th.style.cssText='padding:12px 16px;text-align:center;border-bottom:2px solid var(--card-border);color:var(--text-secondary);font-size:14px;font-weight:700';h.appendChild(th);});
            t.strings.forEach((s,i)=>{
                const p=parseNote(s);
                const tr=document.createElement('tr');
                [i+1,'<b style="font-size:16px">'+s.slice(0,-1)+'</b>'+s.slice(-1),p?p.freq.toFixed(2)+' Hz':'--',p?p.midi:'--'].forEach(v=>{
                    const td=document.createElement('td');td.innerHTML=v;td.style.cssText='padding:12px 16px;text-align:center;border-bottom:1px solid var(--card-border);color:var(--text);font-size:15px';tr.appendChild(td);
                });
                b.appendChild(tr);
            });
        }
    }

    document.getElementById('modeBar').addEventListener('click',e=>{
        if (!e.target.classList.contains('mode-chip')) return;
        document.querySelectorAll('.mode-chip').forEach(b=>b.classList.remove('active'));
        e.target.classList.add('active');
        mode=e.target.dataset.mode;
        smoothedHz=null;
        smoothedCents=0;
        musicalFrameCount=0;
        noiseRejectCount=0;
        updateBandpassForMode(mode);
        buildStrings(mode);
        buildRef(mode);
        updateStrings(null);
    });

    buildStrings('guitar');
    buildRef('guitar');

    // ===== THEME + LANG =====
    (function(){
        const btn=document.getElementById('themeToggle');
        const saved=localStorage.getItem('metronome-theme');
        if (saved==='dark'){document.body.classList.add('dark');btn.textContent='🌙';}else{btn.textContent='☀️';}
        btn.addEventListener('click',()=>{
            document.body.classList.toggle('dark');
            const d=document.body.classList.contains('dark');
            btn.textContent=d?'🌙':'☀️';
            localStorage.setItem('metronome-theme',d?'dark':'light');
        });
        const sel=document.getElementById('langSelectTop');
        const sl=localStorage.getItem('metronome-lang');
        if (sl) sel.value=sl;
        sel.addEventListener('change',()=>localStorage.setItem('metronome-lang',sel.value));
    })();
    </script>
