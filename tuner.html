<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐器调音器 — 在线节拍器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/i18n.js"></script>
    <style>
        :root {
            --bg: #f2f7f2;
            --card-bg: #fff;
            --card-border: #d0ddd0;
            --text: #1a2a1a;
            --text-secondary: #666;
            --mute: #999;
        }
        body.dark {
            --bg: #0a0a0f;
            --card-bg: #141419;
            --card-border: #2a2a35;
            --text: #e0e0e0;
            --text-secondary: #999;
            --mute: #666;
        }

        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#d0ddd0;border-radius:3px}

        .nav-pill{padding:6px 16px;border-radius:8px;background:linear-gradient(135deg,#4F8CFF 0%,#6B5CFF 100%);color:#fff;font-size:13px;font-weight:600;text-decoration:none;transition:all .2s ease;white-space:nowrap}
        .nav-pill:hover{box-shadow:0 4px 16px rgba(79,140,255,.4);transform:translateY(-1px)}
        .nav-pill.active{background:#4F8CFF;box-shadow:0 2px 8px rgba(79,140,255,.3)}

        .theme-btn{background:none;border:1px solid var(--card-border);border-radius:6px;font-size:16px;cursor:pointer;padding:2px 5px;line-height:1;transition:all .2s ease;outline:none;color:var(--text)}
        .theme-btn:hover{background:var(--bg);border-color:#4F8CFF}

        .content-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:20px 24px;margin-bottom:16px;box-shadow:0 1px 8px rgba(0,0,0,.03)}

        /* Tuner display */
        .tuner-frame {
            background: linear-gradient(180deg, #f8fafb 0%, #eef2f5 100%);
            border-radius: 24px;
            padding: 28px 24px 20px;
            position: relative;
            border: 1px solid #dde3e8;
        }
        body.dark .tuner-frame { background: linear-gradient(180deg, #1e1e28 0%, #18181f 100%); border-color: #2a2a35; }
        body.dark .mode-chip { border-color: rgba(255,255,255,.18); background: rgba(255,255,255,.06); color: rgba(255,255,255,.55); }
        body.dark .mode-chip:hover { border-color: rgba(255,255,255,.35); color: rgba(255,255,255,.85); }
        body.dark .string-dot { border-color: rgba(255,255,255,.15); background: rgba(255,255,255,.04); color: rgba(255,255,255,.35); }
        body.dark #noteText { fill: #fff!important; }
        body.dark #freqText { fill: rgba(255,255,255,.45)!important; }
        body.dark #devText { fill: rgba(255,255,255,.4)!important; }
        body.dark #hintText { color: rgba(255,255,255,.25)!important; }

        .mode-chip {
            padding: 7px 18px; border-radius: 22px;
            border: 1px solid #d0d8e0;
            background: #fff;
            color: #667;
            font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all .2s ease;
            white-space: nowrap; letter-spacing: .3px;
        }
        .mode-chip:hover { border-color: #4F8CFF; color: #4F8CFF; }
        .mode-chip.active { background: #4F8CFF; border-color: #4F8CFF; color: #fff; box-shadow: 0 2px 14px rgba(79,140,255,.35); }

        .string-dot {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; letter-spacing: .2px;
            transition: all .3s cubic-bezier(.4,0,.2,1);
            border: 1.5px solid #d8dde3;
            background: #f5f6f8; color: #99a;
        }
        .string-dot.near { background: rgba(79,140,255,.15); border-color: rgba(79,140,255,.6); color: #4F8CFF; transform: scale(1.1); }
        .string-dot.locked { background: #2e7d32; border-color: #4ECB71; color: #fff; transform: scale(1.15); box-shadow: 0 0 16px rgba(78,203,113,.35); }
        .string-dot .num { font-size: 9px; margin-right: 1px; opacity: .7; }

        @keyframes lockPulse { 0%,100% { box-shadow: 0 0 12px rgba(78,203,113,.3); } 50% { box-shadow: 0 0 28px rgba(78,203,113,.55); } }
        .string-dot.locked { animation: lockPulse 1.2s ease-in-out infinite; }

        /* Button */
        .power-btn {
            width: 56px; height: 56px; border-radius: 50%;
            border: none; cursor: pointer; transition: all .25s ease;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            background: #4F8CFF; color: #fff;
            box-shadow: 0 4px 20px rgba(79,140,255,.35);
        }
        .power-btn:hover { transform: scale(1.06); box-shadow: 0 6px 28px rgba(79,140,255,.5); }
        .power-btn.on { background: #ef4444; box-shadow: 0 4px 20px rgba(239,68,68,.35); }
        .power-btn.on:hover { box-shadow: 0 6px 28px rgba(239,68,68,.5); }

        footer { border-color: var(--card-border)!important; }
        body.dark footer { border-color: #2a2a35!important; }
        select { background: var(--card-bg); color: var(--mute); border-color: var(--card-border); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- ===== Header Nav ===== -->
    <header class="flex flex-col items-center pt-8 pb-4 px-4">
        <div class="flex flex-wrap justify-center gap-2 mb-3">

            <a href="./staff.html" class="nav-pill" data-i18n="nav-staff">认识五线谱</a>
            <a href="./index.html" class="nav-pill" data-i18n="nav-metronome">免费在线节拍器</a>
            <a href="./circle-of-fifths.html" class="nav-pill" data-i18n="nav-circle">音乐五度圈</a>
            <a href="./ear-training.html" class="nav-pill" data-i18n="nav-ear">绝对音感练耳</a>
        </div>
        <div class="flex items-center justify-center gap-3">
            <button id="themeToggle" class="theme-btn" title="日间/夜间模式">☀️</button>
            <select id="langSelectTop" class="bg-transparent border border-[#d0ddd0] rounded text-gray-500 text-xs py-0.5 px-1.5 focus:outline-none focus:border-accent cursor-pointer">                <option value="zh-CN">🇨🇳 中文</option>
                <option value="en">🇬🇧 English</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="ko">🇰🇷 한국어</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="it">🇮🇹 Italiano</option>
                <option value="es">🇪🇸 Español</option>
                <option value="pt">🇧🇷 Português</option>
                <option value="el">🇬🇷 Ελληνικά</option>
                <option value="ru">🇷🇺 Русский</option>
                <option value="pl">🇵🇱 Polski</option>
                <option value="th">🇹🇭 ไทย</option>
                <option value="vi">🇻🇳 Tiếng Việt</option>
                <option value="my">🇲🇲 မြန်မာ</option>            </select>
        </div>
    </header>

    <main class="flex-1 w-full max-w-lg mx-auto px-4 pb-12">

        <div class="text-center mb-4">
            <h1 class="text-3xl font-bold" style="color:var(--text)" data-i18n="tuner-title">🎸 乐器调音器</h1>
            <p style="color:var(--mute);font-size:13px">Chromatic Tuner — 点击麦克风按钮开始</p>
        </div>

        <!-- ===== TUNER DISPLAY ===== -->
        <div class="tuner-frame">
            <!-- Mode chips -->
            <div class="flex flex-wrap justify-center gap-2 mb-5" id="modeBar">
                <button class="mode-chip" data-mode="chromatic" data-i18n="tuner-chromatic">半音阶</button>
                <button class="mode-chip active" data-mode="guitar" data-i18n="tuner-guitar">🎸 吉他</button>
                <button class="mode-chip" data-mode="ukulele" data-i18n="tuner-ukulele">🪕 尤克里里</button>
                <button class="mode-chip" data-mode="bass" data-i18n="tuner-bass">贝斯</button>
                <button class="mode-chip" data-mode="violin" data-i18n="tuner-violin">🎻 小提琴</button>
            </div>

            <!-- String indicators (non-chromatic modes) -->
            <div class="flex justify-center gap-3 mb-4" id="stringRow" style="display:none"></div>

            <!-- Gauge SVG -->
            <div class="flex justify-center mb-2">
                <svg viewBox="0 0 440 280" style="width:100%;max-width:420px;height:auto" id="gaugeSVG">
                    <defs>
                        <linearGradient id="zoneGrad" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0%" stop-color="#ef4444"/>
                            <stop offset="23%" stop-color="#f59e0b"/>
                            <stop offset="42%" stop-color="#4ECB71"/>
                            <stop offset="58%" stop-color="#4ECB71"/>
                            <stop offset="77%" stop-color="#f59e0b"/>
                            <stop offset="100%" stop-color="#ef4444"/>
                        </linearGradient>
                        <filter id="softGlow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                        <filter id="needleShadow"><feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
                    </defs>

                    <!-- Background arc -->
                    <path d="M 60 240 A 180 180 0 0 1 380 240"
                          fill="none" stroke="#e4e8ec" stroke-width="26" stroke-linecap="round"/>

                    <!-- Colored zone arc -->
                    <path d="M 68 236 A 172 172 0 0 1 372 236"
                          fill="none" stroke="url(#zoneGrad)" stroke-width="10" stroke-linecap="butt" opacity="0.7"/>

                    <!-- Tick lines rendered by JS below -->
                    <g id="tickGroup"></g>

                    <!-- Fine guide marks at center -->
                    <line x1="220" y1="62" x2="220" y2="85" stroke="#999" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="220" cy="78" r="3" fill="#999"/>

                    <!-- Needle -->
                    <g id="needle" filter="url(#needleShadow)" style="transform:rotate(0deg);transform-origin:220px 236px;transition:transform .1s cubic-bezier(.25,.1,.25,1)">
                        <polygon points="217,236 223,236 221,58 219,58" fill="#333" opacity="0.9"/>
                    </g>

                    <!-- Center cap -->
                    <circle cx="220" cy="236" r="14" fill="#e8eaed" stroke="#ccd" stroke-width="1.5"/>
                    <circle cx="220" cy="236" r="6" fill="#4F8CFF"/>

                    <!-- Big center note name -->
                    <text id="noteText" x="220" y="218" text-anchor="middle" font-size="64" font-weight="800" fill="#1a2a1a" letter-spacing="-1">--</text>

                    <!-- Deviation display -->
                    <text id="devText" x="220" y="185" text-anchor="middle" font-size="16" font-weight="700" fill="#555"></text>
                </svg>
            </div>

            <!-- Freq info above power button -->
            <p style="color:#888;font-size:14px;text-align:center;margin-bottom:4px;font-weight:500" id="freqLine">A4 = 440 Hz</p>
            <!-- Power button -->
            <div class="flex justify-center">
                <button class="power-btn" id="powerBtn" onclick="toggleTuner()" title="开始/停止调音">
                    <span id="powerIcon">🎤</span>
                </button>
            </div>
            <p style="color:#999;font-size:11px;text-align:center;margin-top:8px" id="hintText">点击麦克风按钮，允许浏览器访问麦克风</p>
        </div>

        <!-- ===== Reference table ===== -->
        <div class="content-card" id="refCard">
            <h2 class="text-xl font-bold mb-3" style="color:var(--text)" id="refTitle">📋 吉他标准定弦</h2>
            <p style="color:var(--mute);font-size:14px;margin-bottom:14px">从粗到细 · A4 = 440 Hz</p>
            <div class="overflow-x-auto">
                <table style="width:100%;border-collapse:collapse;font-size:15px" id="refTable">
                    <thead id="refHead"></thead>
                    <tbody id="refBody"></tbody>
                </table>
            </div>
        </div>

    </main>

    <footer class="text-center text-xs py-6 border-t" style="color:var(--mute);border-color:var(--card-border)">
        <a href="./index.html" class="text-blue-500 hover:underline" data-i18n="back-home">← 返回节拍器</a>
    </footer>

    <script>
    // ===== DATA =====
    const NOTES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
    const TUNINGS = {
        chromatic: { name:'半音阶', strings:null },
        guitar:    { name:'吉他',     strings:['E2','A2','D3','G3','B3','E4'], labels:['⑥','⑤','④','③','②','①'] },
        ukulele:   { name:'尤克里里', strings:['G4','C4','E4','A4'], labels:['④','③','②','①'] },
        bass:      { name:'贝斯',     strings:['E1','A1','D2','G2'], labels:['④','③','②','①'] },
        violin:    { name:'小提琴',   strings:['G3','D4','A4','E5'], labels:['④','③','②','①'] }
    };

    function parseNote(s) {
        const m = s.match(/^([A-G][♯#♭b]?)(\d)$/);
        if (!m) return null;
        let n = m[1].replace('#','♯').replace('b','♭');
        const oct = parseInt(m[2]);
        const semi = NOTES.indexOf(n);
        if (semi === -1) return null;
        const midi = semi + (oct+1)*12;
        return { name:n, oct, midi, freq: 440*Math.pow(2,(midi-69)/12) };
    }

    function midiToNote(m) {
        const s = Math.round(m) % 12, o = Math.floor(Math.round(m)/12)-1;
        return { name:NOTES[s], oct:o, freq:440*Math.pow(2,(m-69)/12) };
    }

    // ===== DRAW TICKS =====
    const CX=220, CY=236, R=172;
    (function(){
        const g = document.getElementById('tickGroup');
        for (let i=-50; i<=50; i+=5) {
            const angle = (-90 + i*1.6) * Math.PI/180; // spread 80° each side
            const inner = 162, outer = i%10===0 ? 178 : 170;
            const x1 = CX+inner*Math.cos(angle), y1 = CY+inner*Math.sin(angle);
            const x2 = CX+outer*Math.cos(angle), y2 = CY+outer*Math.sin(angle);
            const line = document.createElementNS('http://www.w3.org/2000/svg','line');
            line.setAttribute('x1',x1); line.setAttribute('y1',y1);
            line.setAttribute('x2',x2); line.setAttribute('y2',y2);
            line.setAttribute('stroke', i===0?'#333':(i%10===0?'#666':'#bbb'));
            line.setAttribute('stroke-width', i===0?'2.5':(i%10===0?'1.5':'.9'));
            line.setAttribute('stroke-linecap','round');
            g.appendChild(line);
            // Major labels
            if (i%10===0 && i!==0) {
                const lx = CX+(outer+16)*Math.cos(angle), ly = CY+(outer+16)*Math.sin(angle);
                const t = document.createElementNS('http://www.w3.org/2000/svg','text');
                t.setAttribute('x',lx); t.setAttribute('y',ly);
                t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','central');
                t.setAttribute('font-size','11'); t.setAttribute('fill','#555'); t.setAttribute('font-weight','600');
                t.textContent = i>0?'+'+i:i;
                g.appendChild(t);
            }
        }
    })();

    // ===== AUDIO ENGINE =====
    let ctx=null, analyser=null, running=false, mode='guitar';
    let smoothedCents=0, smoothedMidi=null, stableFrames=0;

    async function toggleTuner() {
        if (running) { stopTuner(); return; }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
            ctx = new (window.AudioContext||window.webkitAudioContext)();
            const src = ctx.createMediaStreamSource(stream);
            analyser = ctx.createAnalyser();
            analyser.fftSize=2048; analyser.smoothingTimeConstant=0.3;
            src.connect(analyser);
            running=true;
            document.getElementById('powerIcon').textContent='⏹';
            document.getElementById('powerBtn').classList.add('on');
            document.getElementById('hintText').textContent='正在监听…请弹奏一个音';
            tick();
        } catch(e) {
            document.getElementById('hintText').textContent='⚠ 无法访问麦克风，请检查权限';
            console.error(e);
        }
    }

    function stopTuner() {
        running=false;smoothedMidi=null;smoothedCents=0;stableFrames=0;
        if(ctx){ctx.close();ctx=null;analyser=null;}
        document.getElementById('powerIcon').textContent='🎤';
        document.getElementById('powerBtn').classList.remove('on');
        document.getElementById('hintText').textContent='已停止';
        document.getElementById('noteText').textContent='--';
        document.getElementById('freqLine').textContent='A4 = 440 Hz';
        document.getElementById('devText').textContent='';
        document.getElementById('devText').setAttribute('fill','#555');
        document.getElementById('needle').style.transform='rotate(0deg)';
        updateStrings(null);
    }

    // NSDF (Normalized Square Difference Function) pitch detection
    // Unbiased — correctly detects fundamental, not harmonics
    function detectPitch(buf) {
        const n=buf.length, sr=ctx.sampleRate;
        const minLag=Math.floor(sr/1500); // ~C5
        const maxLag=Math.floor(sr/50);   // ~G1
        if (maxLag>=n) return -1;

        // Pre-compute squares cumulative sum for fast NSDF denominator
        const sqSum = new Float64Array(n);
        sqSum[0]=buf[0]*buf[0];
        for (let i=1;i<n;i++) sqSum[i]=sqSum[i-1]+buf[i]*buf[i];

        let bestNSDF=-2, bestLag=-1;
        const nsdfVals=[];

        for (let lag=minLag; lag<maxLag; lag++) {
            // Auto-correlation r
            let r=0;
            for (let i=0;i<n-lag;i++) r+=buf[i]*buf[i+lag];
            // Energy m = sum of squares in the two windows
            const m=sqSum[n-lag-1]+(sqSum[n-1]-sqSum[lag-1]);
            if (m<1e-12) continue;
            const nsdf=2*r/m;
            nsdfVals.push({lag,nsdf});
            if (nsdf>bestNSDF){bestNSDF=nsdf;bestLag=lag;}
        }

        // Only accept if correlation is strong enough
        if (bestNSDF<0.7) return -1;
        if (bestLag<=minLag||bestLag>=maxLag-1) return -1;

        // Parabolic interpolation on NSDF peak
        let cm1=0,c0=bestNSDF,c1=0;
        let lm1=0,l1=0;
        for (const v of nsdfVals) {
            if (v.lag===bestLag-1){cm1=v.nsdf;lm1=bestLag-1;}
            if (v.lag===bestLag+1){c1=v.nsdf;l1=bestLag+1;}
        }
        const div=2*(2*c0-c1-cm1);
        if (Math.abs(div)<1e-10) return sr/bestLag;
        const delta=(c1-cm1)/div;
        const refinedLag=bestLag+delta;
        if (refinedLag<=0) return sr/bestLag;
        return sr/refinedLag;
    }

    function tick() {
        if (!running) return;
        const buf = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buf);
        let rms=0; for(let i=0;i<buf.length;i++)rms+=buf[i]*buf[i]; rms=Math.sqrt(rms/buf.length);

        // NSDF already rejects noise, so lower threshold is safe
        if (rms<0.006) {
            document.getElementById('noteText').textContent='--';
            document.getElementById('freqLine').textContent='等待信号…';
            document.getElementById('devText').textContent='';
            document.getElementById('needle').style.transform='rotate(0deg)';
            updateStrings(null);
            stableFrames=0;
        } else {
            const f=detectPitch(buf);
            if (f>30&&f<2000) {
                // Smooth raw MIDI (not rounded) for better stability
                const rawMidi=69+12*Math.log2(f/440);
                if (smoothedMidi===null){smoothedMidi=rawMidi;stableFrames=1;}
                else {
                    // Reject jumps > 2 semitones (harmonic/octave error)
                    if (Math.abs(rawMidi-smoothedMidi)>2) {
                        stableFrames=0;
                        requestAnimationFrame(tick);
                        return;
                    }
                    smoothedMidi=smoothedMidi*.8+rawMidi*.2;
                    stableFrames++;
                }
                const mr=Math.round(smoothedMidi);
                const cents=100*(smoothedMidi-mr);

                // Only display after 2 stable frames
                if (stableFrames>=2) {
                    const note=midiToNote(mr+cents/100);
                    updateDisplay(note,cents,mr);
                    updateStrings(mr);
                }
            } else {
                stableFrames=0;
            }
        }
        requestAnimationFrame(tick);
    }

    function updateDisplay(note,cents,midi) {
        const nEl=document.getElementById('noteText'), fEl=document.getElementById('freqLine');
        const dEl=document.getElementById('devText'), ndl=document.getElementById('needle');

        nEl.textContent=note.name+note.oct;
        fEl.textContent=note.freq.toFixed(1)+' Hz · MIDI '+midi;

        const abs=Math.abs(cents);
        let color, dev;
        if (abs<5) { color='#4ECB71'; dev='✓ 准了'; nEl.style.filter='url(#softGlow)'; }
        else if (abs<15) { color='#f59e0b'; dev=(cents>0?'偏高 ↑ ':'偏低 ↓ ')+abs.toFixed(0)+'¢'; nEl.style.filter='none'; }
        else { color='#ef4444'; dev=(cents>0?'偏高 ↑ ':'偏低 ↓ ')+abs.toFixed(0)+'¢'; nEl.style.filter='none'; }
        nEl.setAttribute('fill',color);
        dEl.textContent=dev; dEl.setAttribute('fill',color);

        const angle=Math.max(-55,Math.min(55,cents*1.0));
        ndl.style.transform='rotate('+angle+'deg)';
    }

    function updateStrings(midi) {
        if (mode==='chromatic') return;
        const dots=document.querySelectorAll('.string-dot');
        dots.forEach((d,i)=>{
            const t=parseNote(TUNINGS[mode].strings[i]);
            d.classList.remove('near','locked');
            if (midi!==null && t && Math.abs(midi-t.midi)<=1) {
                d.classList.add(midi===t.midi?'locked':'near');
            }
        });
    }

    // ===== MODE + STRING PEGS =====
    function buildStrings(m) {
        const row=document.getElementById('stringRow');
        const t=TUNINGS[m];
        row.innerHTML='';
        if (!t.strings){row.style.display='none';return;}
        row.style.display='flex';
        t.strings.forEach((s,i)=>{
            const d=document.createElement('div');
            d.className='string-dot';
            d.title=s+' ('+parseNote(s).freq.toFixed(1)+'Hz)';
            d.innerHTML='<span class="num">'+(t.labels[i]||(i+1))+'</span>'+s.slice(0,-1);
            row.appendChild(d);
        });
    }

    function buildRef(m) {
        const h=document.getElementById('refHead'), b=document.getElementById('refBody');
        const ttl=document.getElementById('refTitle');
        h.innerHTML=''; b.innerHTML='';
        if (m==='chromatic') {
            ttl.textContent='📋 半音阶参考频率';
            ['音名','频率','MIDI'].forEach(v=>{const th=document.createElement('th');th.textContent=v;th.style.cssText='padding:12px 16px;text-align:center;border-bottom:2px solid var(--card-border);color:var(--text-secondary);font-size:14px;font-weight:700';h.appendChild(th);});
            for (let mi=60;mi<=71;mi++) {
                const n=midiToNote(mi);
                const tr=document.createElement('tr');
                ['<b style="font-size:16px">'+n.name+'</b> '+n.oct, n.freq.toFixed(2)+' Hz', mi].forEach((v,i)=>{
                    const td=document.createElement('td');td.innerHTML=v;td.style.cssText='padding:12px 16px;text-align:center;border-bottom:1px solid var(--card-border);color:var(--text);font-size:15px';tr.appendChild(td);
                });
                b.appendChild(tr);
            }
        } else {
            const t=TUNINGS[m];
            ttl.textContent='📋 '+t.name+' 标准定弦';
            ['弦序','音名','频率 (Hz)','MIDI'].forEach(v=>{const th=document.createElement('th');th.textContent=v;th.style.cssText='padding:12px 16px;text-align:center;border-bottom:2px solid var(--card-border);color:var(--text-secondary);font-size:14px;font-weight:700';h.appendChild(th);});
            t.strings.forEach((s,i)=>{
                const p=parseNote(s);
                const tr=document.createElement('tr');
                [i+1,'<b style="font-size:16px">'+s.slice(0,-1)+'</b>'+s.slice(-1),p?p.freq.toFixed(2)+' Hz':'--',p?p.midi:'--'].forEach(v=>{
                    const td=document.createElement('td');td.innerHTML=v;td.style.cssText='padding:12px 16px;text-align:center;border-bottom:1px solid var(--card-border);color:var(--text);font-size:15px';tr.appendChild(td);
                });
                b.appendChild(tr);
            });
        }
    }

    document.getElementById('modeBar').addEventListener('click',e=>{
        if (!e.target.classList.contains('mode-chip')) return;
        document.querySelectorAll('.mode-chip').forEach(b=>b.classList.remove('active'));
        e.target.classList.add('active');
        mode=e.target.dataset.mode;
        smoothedMidi=null;smoothedCents=0;stableFrames=0;
        buildStrings(mode);
        buildRef(mode);
        updateStrings(null);
    });

    buildStrings('guitar');
    buildRef('guitar');

    // ===== THEME + LANG =====
    (function(){
        const btn=document.getElementById('themeToggle');
        const saved=localStorage.getItem('metronome-theme');
        if (saved==='dark'){document.body.classList.add('dark');btn.textContent='🌙';}else{btn.textContent='☀️';}
        btn.addEventListener('click',()=>{
            document.body.classList.toggle('dark');
            const d=document.body.classList.contains('dark');
            btn.textContent=d?'🌙':'☀️';
            localStorage.setItem('metronome-theme',d?'dark':'light');
        });
        const sel=document.getElementById('langSelectTop');
        const sl=localStorage.getItem('metronome-lang');
        if (sl) sel.value=sl;
        sel.addEventListener('change',()=>localStorage.setItem('metronome-lang',sel.value));
    })();
    </script>
</body>
</html>
