<script>
// ===== DRUM SYNTHESIS ENGINE =====
let ac=null, bpm=120, playing=false, stepIdx=-1, timerId=null;
function ctx(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();}

function playDrum(name,t){
    ctx();const now=ac.currentTime+t/1000;
    const g=ac.createGain();g.connect(ac.destination);
    if(name==='kick'){
        const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(150,now);o.frequency.exponentialRampToValueAtTime(40,now+.08);
        g.gain.setValueAtTime(.8,now);g.gain.exponentialRampToValueAtTime(.001,now+.25);
        o.connect(g);o.start(now);o.stop(now+.3);
    }else if(name==='snare'){
        const o=ac.createOscillator();o.type='triangle';o.frequency.value=200;
        g.gain.setValueAtTime(.5,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);
        const n=ac.createOscillator();const ng=ac.createGain();
        // noise via rapid random frequency modulation
        const bn=ac.createBufferSource();const buf=ac.createBuffer(1,ac.sampleRate*.1,ac.sampleRate);const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
        bn.buffer=buf;const bf=ac.createBiquadFilter();bf.type='highpass';bf.frequency.value=1000;
        ng.gain.setValueAtTime(.3,now);ng.gain.exponentialRampToValueAtTime(.001,now+.1);
        bn.connect(bf);bf.connect(ng);ng.connect(ac.destination);
        o.connect(g);bn.start(now);
    }else if(name==='hhclosed'){
        const bn=ac.createBufferSource();const buf=ac.createBuffer(1,ac.sampleRate*.05,ac.sampleRate);const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
        bn.buffer=buf;const bf=ac.createBiquadFilter();bf.type='highpass';bf.frequency.value=8000;
        g.gain.setValueAtTime(.15,now);g.gain.exponentialRampToValueAtTime(.001,now+.05);
        bn.connect(bf);bf.connect(g);bn.start(now);
    }else if(name==='hhopen'){
        const bn=ac.createBufferSource();const buf=ac.createBuffer(1,ac.sampleRate*.3,ac.sampleRate);const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
        bn.buffer=buf;const bf=ac.createBiquadFilter();bf.type='highpass';bf.frequency.value=6000;
        g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.001,now+.25);
        bn.connect(bf);bf.connect(g);bn.start(now);
    }else if(name==='tomhi'){
        const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(150,now+.1);
        g.gain.setValueAtTime(.4,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);
        o.connect(g);o.start(now);o.stop(now+.25);
    }else if(name==='tomlo'){
        const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(80,now+.12);
        g.gain.setValueAtTime(.5,now);g.gain.exponentialRampToValueAtTime(.001,now+.25);
        o.connect(g);o.start(now);o.stop(now+.3);
    }else if(name==='crash'){
        const bn=ac.createBufferSource();const buf=ac.createBuffer(1,ac.sampleRate*.8,ac.sampleRate);const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
        bn.buffer=buf;const bf=ac.createBiquadFilter();bf.type='highpass';bf.frequency.value=4000;
        g.gain.setValueAtTime(.25,now);g.gain.exponentialRampToValueAtTime(.001,now+.7);
        bn.connect(bf);bf.connect(g);bn.start(now);
    }else if(name==='clap'){
        const bn=ac.createBufferSource();const buf=ac.createBuffer(1,ac.sampleRate*.08,ac.sampleRate);const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
        bn.buffer=buf;const bf=ac.createBiquadFilter();bf.type='bandpass';bf.frequency.value=2000;bf.Q.value=1;
        g.gain.setValueAtTime(.35,now);g.gain.exponentialRampToValueAtTime(.001,now+.08);
        bn.connect(bf);bf.connect(g);bn.start(now);
    }
}

let currentPreset='流行';
let pattern=JSON.parse(JSON.stringify(PRESETS['流行'].pattern));

function applyPreset(name){
    currentPreset=name;
    pattern=JSON.parse(JSON.stringify(PRESETS[name].pattern));
    bpm=PRESETS[name].bpm;
    document.getElementById('bpmSlider').value=bpm;
    document.getElementById('bpmDisplay').textContent=bpm;
    drawGrid();
    drawPresets();
}

function toggleCell(drum,step){
    pattern[drum][step]=pattern[drum][step]?0:1;
    drawGrid();
}

function drawGrid(){
    const grid=document.getElementById('stepGrid');
    let h='<div style="display:flex;flex-direction:column;gap:3px">';
    DRUMS.forEach(d=>{
        h+='<div style="display:flex;align-items:center;gap:2px">';
        h+='<span class="drum-label">'+DRUM_NAMES[d]+'</span>';
        for(let s=0;s<STEPS;s++){
            const on=pattern[d][s]?' on':'';
            const beat=s%4===0?' beat':'';
            const active=(playing&&stepIdx===s)?' active':'';
            h+='<div class="step-cell'+on+beat+active+'" onclick="toggleCell(\''+d+'\','+s+')" title="'+(s+1)+'"></div>';
        }
        h+='</div>';
    });
    h+='<div style="display:flex;align-items:center;gap:2px;margin-top:2px">';
    h+='<span class="drum-label" style="font-size:10px">节拍</span>';
    for(let s=0;s<STEPS;s++){
        h+='<div style="width:28px;text-align:center;font-size:10px;color:var(--mute)">'+(s%4===0?'<b>'+(Math.floor(s/4)+1)+'</b>':(s%4===2?'·':''))+'</div>';
    }
    h+='</div></div>';
    grid.innerHTML=h;
}

function drawPresets(){
    const bar=document.getElementById('presetBar');
    bar.innerHTML='';
    Object.keys(PRESETS).forEach(name=>{
        const chip=document.createElement('span');
        chip.className='preset-chip'+(name===currentPreset?' on':'');
        chip.textContent=name;
        chip.onclick=()=>{if(playing)stopPlay();applyPreset(name);};
        bar.appendChild(chip);
    });
}

function playStep(){
    if(!playing)return;
    stepIdx=(stepIdx+1)%STEPS;
    DRUMS.forEach(d=>{if(pattern[d][stepIdx])playDrum(d,0);});
    drawGrid();
    const interval=60000/bpm/4;
    timerId=setTimeout(playStep,interval);
}

function togglePlay(){
    if(playing){stopPlay();return;}
    ctx();playing=true;stepIdx=-1;
    document.getElementById('playBtn').classList.add('playing');
    document.getElementById('playIcon').textContent='⏹';
    document.getElementById('playLabel').textContent='停止';
    playStep();
}
function stopPlay(){
    playing=false;stepIdx=-1;
    clearTimeout(timerId);
    document.getElementById('playBtn').classList.remove('playing');
    document.getElementById('playIcon').textContent='▶';
    document.getElementById('playLabel').textContent='播放';
    drawGrid();
}

function setBPM(v){bpm=parseInt(v);document.getElementById('bpmDisplay').textContent=bpm;}

let tapTimes=[];
function tapTempo(){
    const now=Date.now();tapTimes.push(now);
    if(tapTimes.length>8)tapTimes.shift();
    if(tapTimes.length>1){
        const intervals=[];
        for(let i=1;i<tapTimes.length;i++)intervals.push(tapTimes[i]-tapTimes[i-1]);
        const avg=intervals.reduce((a,b)=>a+b,0)/intervals.length;
        bpm=Math.round(60000/avg);
        bpm=Math.max(40,Math.min(220,bpm));
        document.getElementById('bpmSlider').value=bpm;
        document.getElementById('bpmDisplay').textContent=bpm;
    }
    document.getElementById('tapBtn').classList.add('on');
    setTimeout(()=>document.getElementById('tapBtn').classList.remove('on'),150);
}

// Keyboard
document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
    if(e.code==='Space'){e.preventDefault();togglePlay();}
    if(e.code==='ArrowLeft'){e.preventDefault();setBPM(Math.max(40,bpm-5));document.getElementById('bpmSlider').value=bpm;}
    if(e.code==='ArrowRight'){e.preventDefault();setBPM(Math.min(220,bpm+5));document.getElementById('bpmSlider').value=bpm;}
});

drawGrid();drawPresets();

// Theme + lang
(function(){const btn=document.getElementById('themeToggle');const s=localStorage.getItem('metronome-theme');if(s==='dark'){document.body.classList.add('dark');btn.textContent='🌙';}else{btn.textContent='☀️';}btn.addEventListener('click',()=>{document.body.classList.toggle('dark');const d=document.body.classList.contains('dark');btn.textContent=d?'🌙':'☀️';localStorage.setItem('metronome-theme',d?'dark':'light');});const sel=document.getElementById('langSelectTop');const sl=localStorage.getItem('metronome-lang');if(sl)sel.value=sl;sel.addEventListener('change',()=>localStorage.setItem('metronome-lang',sel.value));})();
</script>
