.theme-btn:hover{background:var(--bg);border-color:#4F8CFF}
.key-tab{padding:8px 16px;border-radius:20px;border:2px solid transparent;background:var(--card-bg);color:var(--text2);font-size:15px;font-weight:700;cursor:pointer;transition:all .15s ease;white-space:nowrap}
.key-tab:hover{border-color:var(--accent);color:var(--accent)}
.key-tab.on{background:var(--accent);color:#fff;box-shadow:0 2px 16px rgba(79,140,255,.3)}
body.dark .key-tab{background:#1a1a21;border-color:#2a2a35}
body.dark .key-tab.on{background:var(--accent);border-color:var(--accent)}
.chord-hero{background:var(--card-bg);border:2px solid var(--card-border);border-radius:20px;padding:32px 24px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06);margin-bottom:16px}

// open: [string numbers played open]

// dots: [{str:1-6, fr:fret_number}]
const DB = {

{n:'D',mu:[6,5],o:[4],d:[{s:3,f:2},{s:2,f:3},{s:1,f:2}],nt:'D-F#-A',ty:'大三和弦',en:'Major'},

c:[
{n:'E',mu:[],o:[6,2,1],d:[{s:5,f:2},{s:4,f:2},{s:3,f:1}],nt:'E-G#-B',ty:'大三和弦',en:'Major'},
{n:'F#m',mu:[],o:[],b:1,fs:2,d:[{s:5,f:3},{s:4,f:3}],nt:'F#-A-C#',ty:'小三和弦',en:'Minor'},
{n:'G#m',mu:[],o:[],b:1,fs:4,d:[{s:5,f:3},{s:4,f:3}],nt:'G#-B-D#',ty:'小三和弦',en:'Minor'},
{n:'A',mu:[6],o:[5,1],d:[{s:4,f:2},{s:3,f:2},{s:2,f:2}],nt:'A-C#-E',ty:'大三和弦',en:'Major'},
{n:'B',mu:[6],o:[],b:1,fs:2,d:[{s:4,f:3},{s:3,f:3},{s:2,f:3}],nt:'B-D#-F#',ty:'大三和弦',en:'Major'},
{n:'C#m',mu:[6],o:[],b:1,fs:4,d:[{s:4,f:3},{s:3,f:3},{s:2,f:2}],nt:'C#-E-G#',ty:'小三和弦',en:'Minor'},
{n:'B7',mu:[6],o:[],b:1,fs:2,d:[{s:4,f:3},{s:2,f:3}],nt:'B-D#-F#-A',ty:'属七和弦',en:'Dominant 7th'},
]},
'F':{t:'F大调。一个降号(Bb)。',et:'F Major. One flat: Bb.',
c:[
{n:'F',mu:[],o:[],b:1,d:[{s:5,f:3},{s:4,f:3},{s:3,f:2}],nt:'F-A-C',ty:'大三和弦',en:'Major'},
{n:'Gm',mu:[],o:[],b:1,fs:3,d:[{s:5,f:3},{s:4,f:3}],nt:'G-Bb-D',ty:'小三和弦',en:'Minor'},
{n:'Am',mu:[6],o:[5,1],d:[{s:4,f:2},{s:3,f:2},{s:2,f:1}],nt:'A-C-E',ty:'小三和弦',en:'Minor'},
{n:'Bb',mu:[6],o:[],b:1,d:[{s:4,f:3},{s:3,f:3},{s:2,f:3}],nt:'Bb-D-F',ty:'大三和弦',en:'Major'},
{n:'C',mu:[6],o:[3,1],d:[{s:5,f:3},{s:4,f:2},{s:2,f:1}],nt:'C-E-G',ty:'大三和弦',en:'Major'},
{n:'Dm',mu:[6,5],o:[4],d:[{s:3,f:2},{s:2,f:3},{s:1,f:1}],nt:'D-F-A',ty:'小三和弦',en:'Minor'},
{n:'C7',mu:[6],o:[3,1],d:[{s:5,f:3},{s:4,f:2},{s:3,f:3},{s:2,f:1}],nt:'C-E-G-Bb',ty:'属七和弦',en:'Dominant 7th'},
]},
'G':{t:'G大调。一个升号(F#)。民谣最常用。',et:'G Major. One sharp: F#. Most common acoustic key.',
c:[
{n:'G',mu:[],o:[4,3,2],d:[{s:6,f:3},{s:5,f:2},{s:1,f:3}],nt:'G-B-D',ty:'大三和弦',en:'Major'},
{n:'Am',mu:[6],o:[5,1],d:[{s:4,f:2},{s:3,f:2},{s:2,f:1}],nt:'A-C-E',ty:'小三和弦',en:'Minor'},
{n:'Bm',mu:[6],o:[],b:1,fs:2,d:[{s:4,f:3},{s:3,f:3},{s:2,f:2}],nt:'B-D-F#',ty:'小三和弦',en:'Minor'},
{n:'C',mu:[6],o:[3,1],d:[{s:5,f:3},{s:4,f:2},{s:2,f:1}],nt:'C-E-G',ty:'大三和弦',en:'Major'},
{n:'D',mu:[6,5],o:[4],d:[{s:3,f:2},{s:2,f:3},{s:1,f:2}],nt:'D-F#-A',ty:'大三和弦',en:'Major'},
{n:'Em',mu:[],o:[6,3,2,1],d:[{s:5,f:2},{s:4,f:2}],nt:'E-G-B',ty:'小三和弦',en:'Minor'},
{n:'D7',mu:[6,5],o:[4],d:[{s:3,f:2},{s:2,f:1},{s:1,f:2}],nt:'D-F#-A-C',ty:'属七和弦',en:'Dominant 7th'},
]},
'A':{t:'A大调。三个升号(F#,C#,G#)。',et:'A Major. Three sharps: F#, C#, G#.',
c:[
{n:'A',mu:[6],o:[5,1],d:[{s:4,f:2},{s:3,f:2},{s:2,f:2}],nt:'A-C#-E',ty:'大三和弦',en:'Major'},
{n:'Bm',mu:[6],o:[],b:1,fs:2,d:[{s:4,f:3},{s:3,f:3},{s:2,f:2}],nt:'B-D-F#',ty:'小三和弦',en:'Minor'},
{n:'C#m',mu:[6],o:[],b:1,fs:4,d:[{s:4,f:3},{s:3,f:3},{s:2,f:2}],nt:'C#-E-G#',ty:'小三和弦',en:'Minor'},
{n:'D',mu:[6,5],o:[4],d:[{s:3,f:2},{s:2,f:3},{s:1,f:2}],nt:'D-F#-A',ty:'大三和弦',en:'Major'},
{n:'E',mu:[],o:[6,2,1],d:[{s:5,f:2},{s:4,f:2},{s:3,f:1}],nt:'E-G#-B',ty:'大三和弦',en:'Major'},
{n:'F#m',mu:[],o:[],b:1,fs:2,d:[{s:5,f:3},{s:4,f:3}],nt:'F#-A-C#',ty:'小三和弦',en:'Minor'},
{n:'E7',mu:[],o:[6,4,2,1],d:[{s:5,f:2},{s:3,f:1}],nt:'E-G#-B-D',ty:'属七和弦',en:'Dominant 7th'},
]},
'B':{t:'B大调。五个升号。',et:'B Major. Five sharps.',
c:[
{n:'B',mu:[6],o:[],b:1,fs:2,d:[{s:4,f:3},{s:3,f:3},{s:2,f:3}],nt:'B-D#-F#',ty:'大三和弦',en:'Major'},
{n:'C#m',mu:[6],o:[],b:1,fs:4,d:[{s:4,f:3},{s:3,f:3},{s:2,f:2}],nt:'C#-E-G#',ty:'小三和弦',en:'Minor'},
{n:'D#m',mu:[6],o:[],b:1,fs:6,d:[{s:4,f:3},{s:3,f:3},{s:2,f:2}],nt:'D#-F#-A#',ty:'小三和弦',en:'Minor'},
{n:'E',mu:[],o:[6,2,1],d:[{s:5,f:2},{s:4,f:2},{s:3,f:1}],nt:'E-G#-B',ty:'大三和弦',en:'Major'},
{n:'F#',mu:[],o:[],b:1,fs:2,d:[{s:5,f:3},{s:4,f:3},{s:3,f:2}],nt:'F#-A#-C#',ty:'大三和弦',en:'Major'},
{n:'G#m',mu:[],o:[],b:1,fs:4,d:[{s:5,f:3},{s:4,f:3}],nt:'G#-B-D#',ty:'小三和弦',en:'Minor'},
{n:'F#7',mu:[],o:[],b:1,fs:2,d:[{s:5,f:3},{s:3,f:2}],nt:'F#-A#-C#-E',ty:'属七和弦',en:'Dominant 7th'},
]},
};
const KEYS=['C','D','E','F','G','A','B'];
const SX=[15,25,35,45,55,65],SY=[24,38,52,66,80];
let ak='C',hi=0,ac=null;
function gc(){return DB[ak].c[hi];}
function ctx(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();}
function play(){
    ctx();const ch=gc(),bm=[40,45,50,55,59,64],n=[];
    for(let s=6;s>=1;s--){
        if(ch.mu&&ch.mu.includes(s))continue; // muted string
        if(ch.o&&ch.o.includes(s)){n.push(bm[6-s]);continue;} // open string
        if(ch.d){const dt=ch.d.find(d=>d.s===s);if(dt){n.push(bm[6-s]+dt.f);continue;}} // dotted string
        if(ch.b){n.push(bm[6-s]+ch.b);continue;} // barre string (no explicit dot, plays at barre fret)
        // string not muted, not open, no dot, no barre → skip
    }
    const now=ac.currentTime;
    n.forEach((m,i)=>{const fr=440*Math.pow(2,(m-69)/12),t=now+i*0.06;const o=ac.createOscillator();o.type='sine';o.frequency.value=fr;const g=ac.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.1,t+.008);g.gain.exponentialRampToValueAtTime(.001,t+2.5);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+2.7);});
}
function svg(ch,lg){
    const w=lg?160:80,h=lg?200:100,c='#4F8CFF',g='#a0aec0',d='#374151';
    let s=`<svg viewBox="0 0 80 100" width="${w}" height="${h}"><g stroke="${g}" stroke-width="0.8">`;
    SX.forEach(x=>s+=`<line x1="${x}" y1="24" x2="${x}" y2="80"/>`);
    SY.forEach(y=>s+=`<line x1="15" y1="${y}" x2="65" y2="${y}"/>`);
    s+=`</g>`;
    const nw=ch.fs?1.0:2.5;
    s+=`<line x1="14" y1="24" x2="66" y2="24" stroke="${d}" stroke-width="${nw}" stroke-linecap="round"/>`;
    if(ch.fs)s+=`<text x="7" y="34" font-size="10" font-weight="700" fill="${g}" text-anchor="middle">${ch.fs}</text>`;
    if(ch.mu)ch.mu.forEach(n=>{const x=SX[6-n];s+=`<g stroke="${g}" stroke-width="1.2" stroke-linecap="round"><line x1="${x-2.5}" y1="10" x2="${x+2.5}" y2="15"/><line x1="${x+2.5}" y1="10" x2="${x-2.5}" y2="15"/></g>`;});
    if(ch.o)ch.o.forEach(n=>{const x=SX[6-n];s+=`<circle cx="${x}" cy="12.5" r="2.5" fill="none" stroke="${g}" stroke-width="1.2"/>`;});
    if(ch.b){const by=SY[ch.b-1]+7;let bMin=6,bMax=1;for(let ss=1;ss<=6;ss++){if(ch.mu&&ch.mu.includes(ss))continue;if(ss<bMin)bMin=ss;if(ss>bMax)bMax=ss;}const bx=SX[6-bMax]-2,bw=SX[6-bMin]-SX[6-bMax]+4;s+=`<rect x="${bx}" y="${by-3}" width="${bw}" height="6" rx="3" fill="${c}" opacity="0.8"/>`;}
    if(ch.d)ch.d.forEach(d=>{const x=SX[6-d.s],y=SY[d.f-1]+7;s+=`<circle cx="${x}" cy="${y}" r="3.8" fill="${c}"/>`;});
    s+=`</svg>`;return s;
}
function bt(){const ct=document.getElementById('keyTabs');ct.innerHTML='';KEYS.forEach(k=>{const b=document.createElement('button');b.className='key-tab'+(k===ak?' on':'');b.textContent=k+' 调';b.onclick=()=>{ak=k;hi=0;ba();};ct.appendChild(b);});}
function uh(){const ch=gc(),kd=DB[ak];document.getElementById('heroName').textContent=ch.n;document.getElementById('heroType').textContent=ch.ty+' ('+ch.en+')';document.getElementById('heroSvg').innerHTML=svg(ch,true);document.getElementById('theoryContent').innerHTML=`<div class="flex flex-wrap gap-1 mb-3">${ch.nt.split('-').map(n=>`<span class="theory-badge">${n}</span>`).join('')}</div><p style="color:var(--text2);font-size:14px;line-height:1.7">${kd.t}</p><p style="color:var(--mute);font-size:13px;line-height:1.7;margin-top:4px">${kd.et}</p>`;}
function bg(){const grid=document.getElementById('chordGrid');grid.innerHTML='';DB[ak].c.forEach((ch,i)=>{const card=document.createElement('div');card.className='chord-grid-card'+(i===hi?' active':'');card.innerHTML=`<div class="name" style="color:${i===hi?'var(--accent)':'var(--text)'}">${ch.n}</div><div class="type">${ch.ty}</div>${svg(ch,false)}`;card.onclick=()=>{hi=i;ba();play();};grid.appendChild(card);});}
function ba(){bt();uh();bg();}
ba();
(function(){const btn=document.getElementById('themeToggle');const s=localStorage.getItem('metronome-theme');if(s==='dark'){document.body.classList.add('dark');btn.textContent='🌙';}else{btn.textContent='☀️';}btn.addEventListener('click',()=>{document.body.classList.toggle('dark');const d=document.body.classList.contains('dark');btn.textContent=d?'🌙':'☀️';localStorage.setItem('metronome-theme',d?'dark':'light');});const sel=document.getElementById('langSelectTop');const sl=localStorage.getItem('metronome-lang');if(sl)sel.value=sl;sel.addEventListener('change',()=>localStorage.setItem('metronome-lang',sel.value));})();
</script>
</body>
