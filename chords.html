    ],
};

const KEYS = ['C','D','E','F','G','A','B'];
const SX = [15,25,35,45,55,65];
const SY = [22,36,50,64,78];
let activeKey = 'C', heroIdx = 0, audioCtx = null;
function activeChord(){ return CHORDS_BY_KEY[activeKey][heroIdx]; }

function ensureCtx(){
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
}

function playHeroChord(){
    ensureCtx();
    const ch = activeChord();
    const baseMidi = [40,45,50,55,59,64];
    const notes = [];
    ch.strings.forEach((val,i)=>{ if(val!==null) notes.push(baseMidi[i]+(val||0)); });
    const now = audioCtx.currentTime;

    notes.forEach((midi, i) => {
        const freq = 440 * Math.pow(2, (midi-69)/12);
        const t = now + i * 0.06; // strum stagger

        // Single sine oscillator per note — pure, no harmonic clash in chords
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;

        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.1, t + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 2.5);

        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 2.7);
    });
}

function chordSVG(ch, large){
    const w = large?160:80, h = large?200:100, c = '#4F8CFF', g = '#a0aec0', d = '#374151';
    let s = `<svg viewBox="0 0 80 106" width="${w}" height="${h}"><g stroke="${g}" stroke-width="0.7">`;
    SX.forEach(x => s += `<line x1="${x}" y1="22" x2="${x}" y2="92"/>`);
    SY.forEach(y => s += `<line x1="15" y1="${y}" x2="65" y2="${y}"/>`);
    s += `</g><line x1="14" y1="22" x2="66" y2="22" stroke="${d}" stroke-width="3" stroke-linecap="round"/>`;
    const mf = Math.min(...ch.strings.filter(v=>v!==null&&v>0))||1;
    if(mf>1) s += `<text x="8" y="40" fill="${g}" font-size="9" font-weight="700">${mf}fr</text>`;
    ch.strings.forEach((val, idx) => {
        const x = SX[idx];
        if(val===null){
            s += `<g stroke="${g}" stroke-width="1.2"><line x1="${x-2.5}" y1="10" x2="${x+2.5}" y2="15"/><line x1="${x+2.5}" y1="10" x2="${x-2.5}" y2="15"/></g>`;
        } else if(val===0){
            s += `<circle cx="${x}" cy="12" r="2.5" fill="none" stroke="${g}" stroke-width="1.2"/>`;
        } else {
            const fy = SY[val-1]+7;
            s += `<circle cx="${x}" cy="${fy}" r="4.5" fill="${c}"/>`;
        }
    });
    if(ch.fingers) ch.fingers.forEach((f, idx) => {
        if(f===null||ch.strings[idx]===null||ch.strings[idx]===0) return;
        const fy = SY[ch.strings[idx]-1]+7;
        s += `<text x="${SX[idx]}" y="${fy+1}" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">${f}</text>`;
    });
    s += `</svg>`;
    return s;
}


function buildKeyTabs(){
    const ct=document.getElementById('keyTabs'); ct.innerHTML='';
    KEYS.forEach(k=>{
        const b=document.createElement('button');
        b.className='key-tab'+(k===activeKey?' on':'');
        b.textContent=k+' 调'; b.onclick=()=>{activeKey=k;heroIdx=0;buildAll();};
        ct.appendChild(b);
    });
}

function updateHero(){
    const ch=activeChord();
    document.getElementById('heroName').textContent=ch.name;
    document.getElementById('heroType').textContent=ch.type+' ('+ch.enType+')';
    document.getElementById('heroSvg').innerHTML=chordSVG(ch,true);
    document.getElementById('theoryContent').innerHTML=`
        <div class="flex flex-wrap gap-1 mb-3">${ch.notes.map(n=>`<span class="theory-badge">${n}</span>`).join('')}</div>
        <p style="color:var(--text2);font-size:14px;line-height:1.7">${ch.theory}</p>
        <p style="color:var(--mute);font-size:13px;line-height:1.7;margin-top:6px">${ch.enTheory}</p>`;
}

function buildChordGrid(){
    const grid=document.getElementById('chordGrid'); grid.innerHTML='';
    CHORDS_BY_KEY[activeKey].forEach((ch,i)=>{
        const card=document.createElement('div');
        card.className='chord-grid-card'+(i===heroIdx?' active':'');
        card.innerHTML=`<div class="name" style="color:${i===heroIdx?'var(--accent)':'var(--text)'}">${ch.name}</div><div class="type">${ch.type}</div>${chordSVG(ch,false)}`;
        card.onclick=()=>{heroIdx=i;buildAll();playHeroChord();};
        grid.appendChild(card);
    });
}

function buildAll(){buildKeyTabs();updateHero();buildChordGrid();}
buildAll();

(function(){
    const btn=document.getElementById('themeToggle');
    const s=localStorage.getItem('metronome-theme');
    if(s==='dark'){document.body.classList.add('dark');btn.textContent='🌙';}else{btn.textContent='☀️';}
    btn.addEventListener('click',()=>{
        document.body.classList.toggle('dark');
        const d=document.body.classList.contains('dark');
        btn.textContent=d?'🌙':'☀️';
        localStorage.setItem('metronome-theme',d?'dark':'light');
    });
    const sel=document.getElementById('langSelectTop');
    const sl=localStorage.getItem('metronome-lang');
    if(sl) sel.value=sl;
    sel.addEventListener('change',()=>localStorage.setItem('metronome-lang',sel.value));
})();
</script>
