<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绝对音感练耳 — 在线节拍器</title>
    <meta name="description" content="音程练耳训练，随机听音辨音程，提升音乐听觉能力。">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
    <style>
        :root{--bg:#f2f7f2;--card-bg:#fff;--card-border:#d0ddd0;--text:#1a2a1a;--text2:#666;--mute:#999}
        body.dark{--bg:#0a0a0f;--card-bg:#141419;--card-border:#2a2a35;--text:#e0e0e0;--text2:#999;--mute:#666}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#d0ddd0;border-radius:3px}

        .nav-pill{padding:6px 16px;border-radius:8px;background:linear-gradient(135deg,#4F8CFF 0%,#6B5CFF 100%);color:#fff;font-size:13px;font-weight:600;text-decoration:none;transition:all .2s ease;white-space:nowrap}
        .nav-pill:hover{box-shadow:0 4px 16px rgba(79,140,255,.4);transform:translateY(-1px)}
        .nav-pill.active{background:#4F8CFF;box-shadow:0 2px 8px rgba(79,140,255,.3)}
        .theme-btn{background:none;border:1px solid var(--card-border);border-radius:6px;font-size:16px;cursor:pointer;padding:2px 5px;line-height:1;transition:all .2s ease;outline:none;color:var(--text)}
        .theme-btn:hover{background:var(--bg);border-color:#4F8CFF}

        .content-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:22px 24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
        .highlight-box{background:#f0f5ff;border-radius:10px;padding:16px 20px;margin:14px 0}
        body.dark .highlight-box{background:#1a1a21!important}
        body.dark .highlight-box p,body.dark .highlight-box li{color:#aaa!important}

        .play-btn{width:100px;height:100px;border-radius:50%;border:none;background:linear-gradient(135deg,#4F8CFF,#6B5CFF);color:#fff;font-size:28px;cursor:pointer;transition:all .2s ease;box-shadow:0 6px 28px rgba(79,140,255,.35);display:flex;align-items:center;justify-content:center;margin:0 auto}
        .play-btn:hover{transform:scale(1.06);box-shadow:0 8px 36px rgba(79,140,255,.5)}
        .play-btn:active{transform:scale(.96)}
        .play-btn.playing{background:linear-gradient(135deg,#f59e0b,#ef4444);box-shadow:0 6px 28px rgba(239,68,68,.35)}

        .answer-btn{padding:10px 32px;border-radius:22px;border:1.5px solid #d0ddd0;background:var(--card-bg);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s ease}
        .answer-btn:hover{border-color:#4F8CFF;color:#4F8CFF}
        body.dark .answer-btn{border-color:#2a2a35}

        .interval-chip{padding:5px 12px;border-radius:16px;border:1.5px solid #d0ddd0;background:var(--card-bg);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s ease;white-space:nowrap;user-select:none}
        .interval-chip.on{border-color:#4F8CFF;background:rgba(79,140,255,.1);color:#4F8CFF}
        body.dark .interval-chip{border-color:#2a2a35}
        body.dark .interval-chip.on{background:rgba(79,140,255,.15)}

        .score-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:16px;font-size:14px;font-weight:600}
        .score-badge.correct{background:#e8f5e9;color:#2e7d32}
        .score-badge.wrong{background:#fce4ec;color:#c62828}
        body.dark .score-badge.correct{background:#1a2a1a}
        body.dark .score-badge.wrong{background:#2a1a1a}

        table{width:100%;border-collapse:collapse;font-size:14px}
        th{background:#f0f5ff;color:#4F8CFF;font-weight:600;padding:10px 12px;text-align:center;border-bottom:2px solid #c8d6f0}
        td{padding:9px 10px;border-bottom:1px solid #e8efe8;text-align:center}
        body.dark th{background:#1a1a21!important;border-color:#2a2a35!important}
        body.dark td{border-color:#2a2a35!important;color:#aaa}

        @keyframes notePulse{0%,100%{opacity:1}50%{opacity:.3}}
        .note-playing{animation:notePulse .6s ease-in-out infinite}

        footer{border-color:var(--card-border)!important}
        body.dark footer{border-color:#2a2a35!important}
        select{background:var(--card-bg);color:var(--mute);border-color:var(--card-border)}
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="flex flex-col items-center pt-8 pb-4 px-4">
        <div class="flex flex-wrap justify-center gap-2 mb-3">
            <a href="./tuner.html" class="nav-pill" data-i18n="nav-tuner">乐器调音器</a>
            <a href="./staff.html" class="nav-pill" data-i18n="nav-staff">认识五线谱</a>
            <a href="./index.html" class="nav-pill" data-i18n="nav-metronome">免费在线节拍器</a>
            <a href="./circle-of-fifths.html" class="nav-pill" data-i18n="nav-circle">音乐五度圈</a>
            <a href="./ear-training.html" class="nav-pill active" data-i18n="nav-ear">绝对音感练耳</a>
        </div>
        <div class="flex items-center justify-center gap-3">
            <button id="themeToggle" class="theme-btn" title="日间/夜间模式">☀️</button>
            <select id="langSelectTop" class="bg-transparent border border-[#d0ddd0] rounded text-gray-500 text-xs py-0.5 px-1.5 focus:outline-none focus:border-accent cursor-pointer">                <option value="zh-CN">🇨🇳 中文</option>
                <option value="en">🇬🇧 English</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="ko">🇰🇷 한국어</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="it">🇮🇹 Italiano</option>
                <option value="es">🇪🇸 Español</option>
                <option value="pt">🇧🇷 Português</option>
                <option value="el">🇬🇷 Ελληνικά</option>
                <option value="ru">🇷🇺 Русский</option>
                <option value="pl">🇵🇱 Polski</option>
                <option value="th">🇹🇭 ไทย</option>
                <option value="vi">🇻🇳 Tiếng Việt</option>
                <option value="my">🇲🇲 မြန်မာ</option>            </select>
        </div>
    </header>

    <main class="flex-1 w-full max-w-2xl mx-auto px-4 pb-12">

        <div class="text-center mb-4">
            <h1 class="text-3xl font-bold" style="color:var(--text)" data-i18n="ear-title">🎵 绝对音感练耳</h1>
            <p style="color:var(--mute);font-size:13px" data-i18n="ear-desc">听两个音 → 判断音程 → 翻答案对比</p>
        </div>

        <!-- ===== Quiz Card ===== -->
        <div class="content-card text-center">
            <!-- Mode selector -->
            <div class="flex justify-center gap-2 mb-2">
                <span class="interval-chip on" id="modeAsc" onclick="setDirection('asc')" data-i18n="ear-asc">⬆ 上行</span>
                <span class="interval-chip" id="modeDesc" onclick="setDirection('desc')" data-i18n="ear-desc-mode">⬇ 下行</span>
                <span class="interval-chip" id="modeBoth" onclick="setDirection('both')" data-i18n="ear-both">↕ 混合</span>
            </div>
            <!-- Sound selector -->
            <div class="flex justify-center gap-2 mb-4">
                <span class="interval-chip on" id="soundPiano" onclick="setSound('piano')">🎹 钢琴</span>
                <span class="interval-chip" id="soundGuitar" onclick="setSound('guitar')">🎸 吉他</span>
            </div>

            <!-- Notes played display -->
            <div class="text-gray-500 text-xs mb-3" id="noteDisplay" style="min-height:18px">点击下方按钮随机出题</div>

            <!-- Play button -->
            <button class="play-btn mb-3" id="playBtn" onclick="(async()=>{await playInterval();})()" title="播放音程">
                <span id="playIcon">▶</span>
            </button>
            <p style="color:var(--mute);font-size:12px;margin-top:4px" id="playHint" data-i18n="ear-play-hint">点击播放音程</p>

            <!-- Answer area -->
            <div class="mt-4" id="answerArea" style="display:none">
                <div class="text-2xl font-extrabold mb-1" id="answerText" style="color:var(--text)"></div>
                <div style="color:var(--mute);font-size:13px" id="answerDetail"></div>
                <div style="color:var(--mute);font-size:12px;margin-top:2px" id="answerSong"></div>
            </div>

            <!-- Buttons -->
            <div class="flex justify-center gap-3 mt-4">
                <button class="answer-btn" id="revealBtn" onclick="revealAnswer()" style="display:none" data-i18n="ear-reveal">👁 翻看答案</button>
                <button class="answer-btn" id="nextBtn" onclick="nextQuestion()" style="display:none" data-i18n="ear-next">➡ 下一题</button>
            </div>

            <!-- Score -->
            <div class="flex justify-center gap-4 mt-4" id="scoreRow" style="display:none">
                <span class="score-badge correct" id="correctBadge">✅ <span id="correctCount">0</span></span>
                <span class="score-badge wrong" id="wrongBadge">❌ <span id="wrongCount">0</span></span>
                <span style="font-size:14px;font-weight:600;color:var(--text2)" id="rateText"></span>
            </div>
        </div>

        <!-- ===== Interval Filter ===== -->
        <div class="content-card">
            <h2 class="text-base font-bold mb-3" style="color:var(--text)" data-i18n="ear-filter-title">🎯 选择练习音程</h2>
            <div class="flex flex-wrap justify-center gap-2" id="intervalFilter"></div>
            <div class="flex justify-center gap-2 mt-3">
                <button class="interval-chip" onclick="selectAll()" data-i18n="ear-select-all">全选</button>
                <button class="interval-chip" onclick="selectNone()" data-i18n="ear-select-none">全不选</button>
                <button class="interval-chip" onclick="selectEasy()" data-i18n="ear-select-easy">入门 (3/4/5 度)</button>
            </div>
        </div>

        <!-- ===== Reference ===== -->
        <div class="content-card">
            <h2 class="text-lg font-bold mb-3" style="color:var(--text)" data-i18n="ear-ref-title">📋 音程速查表</h2>
            <div class="overflow-x-auto">
                <table id="refTable">
                    <thead>
                        <tr><th data-i18n="ear-semi-col">半音数</th><th data-i18n="ear-name-col">音程</th><th data-i18n="ear-abbr-col">简称</th><th data-i18n="ear-qual-col">性质</th><th data-i18n="ear-song-col">记忆歌曲</th></tr>
                    </thead>
                    <tbody id="refBody"></tbody>
                </table>
            </div>
        </div>

    </main>

    <footer class="text-center text-xs py-6 border-t" style="color:var(--mute);border-color:var(--card-border)">
        <a href="./index.html" class="text-blue-500 hover:underline" data-i18n="back-home">← 返回节拍器</a>
    </footer>

    <script>
    // ===== INTERVAL DATA =====
    const INTERVALS = [
        { id:'m2',  name:'小二度',   en:'minor 2nd',    semi:1,  quality:'不协和', song:'《黑色幽默》"难过是因为…"', abbr:'m2' },
        { id:'M2',  name:'大二度',   en:'major 2nd',    semi:2,  quality:'不协和', song:'《你听得到》"想我是…"', abbr:'M2' },
        { id:'m3',  name:'小三度',   en:'minor 3rd',    semi:3,  quality:'协和',   song:'《简单爱》"我想大声…"', abbr:'m3' },
        { id:'M3',  name:'大三度',   en:'major 3rd',    semi:4,  quality:'协和',   song:'《轨迹》"怎么隐藏…"', abbr:'M3' },
        { id:'P4',  name:'纯四度',   en:'perfect 4th',  semi:5,  quality:'完全协和', song:'《婚礼进行曲》《七里香》', abbr:'P4' },
        { id:'TT',  name:'增四/减五', en:'tritone',      semi:6,  quality:'紧张',   song:'救护车声 / Maria', abbr:'TT' },
        { id:'P5',  name:'纯五度',   en:'perfect 5th',  semi:7,  quality:'完全协和', song:'《她的睫毛》/ 星战主题', abbr:'P5' },
        { id:'m6',  name:'小六度',   en:'minor 6th',    semi:8,  quality:'协和',   song:'《死了都要爱》', abbr:'m6' },
        { id:'M6',  name:'大六度',   en:'major 6th',    semi:9,  quality:'协和',   song:'《安静》前奏 / 《世界末日》', abbr:'M6' },
        { id:'m7',  name:'小七度',   en:'minor 7th',    semi:10, quality:'不协和', song:'《好久不见》"我来到…"', abbr:'m7' },
        { id:'M7',  name:'大七度',   en:'major 7th',    semi:11, quality:'不协和', song:'《晴天》"握着你手…"', abbr:'M7' },
        { id:'P8',  name:'纯八度',   en:'perfect octave', semi:12, quality:'完全协和', song:'Somewhere Over the Rainbow', abbr:'P8' }
    ];

    // ===== STATE =====
    let audioCtx = null;
    let currentInterval = null;
    let currentDirection = 'asc';
    let directionMode = 'both';
    let answered = false;
    let correctTotal = 0, wrongTotal = 0;
    let currentRoot = 60;
    let enabledIntervals = new Set(INTERVALS.filter(i=>['m3','M3','P4','P5','P8'].includes(i.id)).map(i=>i.id));
    let soundType = 'piano'; // 'piano' | 'guitar'

    // ===== BUILD FILTER CHIPS =====
    function buildFilter() {
        const container = document.getElementById('intervalFilter');
        container.innerHTML = '';
        INTERVALS.forEach(iv => {
            const chip = document.createElement('span');
            chip.className = 'interval-chip' + (enabledIntervals.has(iv.id) ? ' on' : '');
            chip.textContent = iv.name + ' (' + iv.abbr + ')';
            chip.addEventListener('click', () => {
                if (enabledIntervals.has(iv.id)) {
                    if (enabledIntervals.size <= 1) return; // keep at least 1
                    enabledIntervals.delete(iv.id);
                    chip.classList.remove('on');
                } else {
                    enabledIntervals.add(iv.id);
                    chip.classList.add('on');
                }
            });
            container.appendChild(chip);
        });
    }

    function selectAll() { enabledIntervals = new Set(INTERVALS.map(i=>i.id)); buildFilter(); }
    function selectNone() { enabledIntervals = new Set([INTERVALS[0].id]); buildFilter(); }
    function selectEasy() { enabledIntervals = new Set(['m3','M3','P4','P5','P8']); buildFilter(); }

    function setDirection(dir) {
        directionMode = dir;
        document.getElementById('modeAsc').classList.toggle('on', dir==='asc');
        document.getElementById('modeDesc').classList.toggle('on', dir==='desc');
        document.getElementById('modeBoth').classList.toggle('on', dir==='both');
    }

    function setSound(type) {
        soundType = type;
        document.getElementById('soundPiano').classList.toggle('on', type==='piano');
        document.getElementById('soundGuitar').classList.toggle('on', type==='guitar');
    }

    // ===== AUDIO: soundfont-player (real instrument samples) =====
    let pianoInst = null, guitarInst = null, instrumentsLoaded = false;

    const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    function midiToName(midi) { return NOTE_NAMES[midi%12] + Math.floor(midi/12-1); }

    async function ensureCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
    }

    async function loadInstruments() {
        if (instrumentsLoaded) return;
        await ensureCtx();
        const notes = [];
        for (let m = 48; m <= 83; m++) notes.push(midiToName(m));
        const opts = { notes, gain: 1 };
        try {
            [pianoInst, guitarInst] = await Promise.all([
                Soundfont.instrument(audioCtx, 'acoustic_grand_piano', opts),
                Soundfont.instrument(audioCtx, 'acoustic_guitar_nylon', opts)
            ]);
            instrumentsLoaded = true;
            document.getElementById('playHint').textContent = '音色已加载，点击播放音程';
        } catch(e) {
            console.error('Soundfont load failed:', e);
            document.getElementById('playHint').textContent = '⚠ 音色加载失败，请刷新重试';
        }
    }

    function playNote(midi, time, vol) {
        const inst = soundType === 'guitar' ? guitarInst : pianoInst;
        if (!inst) return;
        // Let real sample play full length — natural decay sounds better
        inst.play(midiToName(midi), time, { gain: vol * 2.5 });
    }

    async function playInterval() {
        await ensureCtx();
        if (!instrumentsLoaded) {
            document.getElementById('playHint').textContent = '正在加载音色…请稍后再点';
            await loadInstruments();
            if (!instrumentsLoaded) return;
        }

        pickNewInterval();
        currentRoot = 48 + Math.floor(Math.random() * 24);

        const btn = document.getElementById('playBtn');
        const icon = document.getElementById('playIcon');
        btn.classList.add('playing'); icon.textContent = '⏸';

        // Extra buffer after resume to ensure AudioContext is stable
        const now = audioCtx.currentTime + 0.15;
        const note1 = currentRoot;
        const semi = currentInterval.semi;
        if (directionMode === 'both') currentDirection = Math.random() < 0.5 ? 'asc' : 'desc';
        else currentDirection = directionMode;
        const note2 = currentDirection === 'asc' ? currentRoot + semi : currentRoot - semi;

        playNote(note1, now, 0.8);
        playNote(note2, now + 0.9, 0.8);

        // Store notes for reveal — don't show them yet (anti-cheat)
        const n1 = midiToName(note1).replace('#','♯');
        const n2 = midiToName(note2).replace('#','♯');
        window._quizNotes = { n1, n2 };

        document.getElementById('noteDisplay').textContent = '🔊 正在播放…仔细听';
        document.getElementById('playHint').textContent = '可以反复点击播放';

        answered = false;
        document.getElementById('revealBtn').style.display = 'inline-block';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('answerArea').style.display = 'none';
        document.getElementById('scoreRow').style.display = 'flex';

        setTimeout(() => { btn.classList.remove('playing'); icon.textContent = '▶'; }, 2200);
    }


    function pickNewInterval() {
        const available = INTERVALS.filter(i => enabledIntervals.has(i.id));
        currentInterval = available[Math.floor(Math.random() * available.length)];
        if (directionMode === 'both') currentDirection = Math.random() < 0.5 ? 'asc' : 'desc';
        else currentDirection = directionMode;
    }

    function revealAnswer() {
        if (!currentInterval) return;
        const iv = currentInterval;
        const area = document.getElementById('answerArea');
        const q = window._quizNotes || { n1: '?', n2: '?' };
        answered = true;

        const dirLabel = currentDirection === 'asc' ? '上行' : '下行';

        // Show notes + answer together in answer area
        document.getElementById('answerText').innerHTML = q.n1 + ' &nbsp;→&nbsp; ' + q.n2;
        document.getElementById('answerDetail').textContent = iv.name + ' (' + iv.abbr + ') · ' + iv.semi + ' 半音 · ' + iv.quality + ' · ' + dirLabel;
        document.getElementById('answerSong').textContent = '🎵 ' + iv.song;

        area.style.display = 'block';
        document.getElementById('revealBtn').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'inline-block';
        document.getElementById('nextBtn').textContent = '➡ 下一题';
    }

    function nextQuestion() {
        pickNewInterval();
        answered = false;
        document.getElementById('noteDisplay').innerHTML = '点击下方按钮随机出题';
        document.getElementById('playHint').textContent = '点击播放音程';
        document.getElementById('answerArea').style.display = 'none';
        document.getElementById('revealBtn').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';

        // Scroll to play button
        document.getElementById('playBtn').scrollIntoView({behavior:'smooth',block:'center'});
    }

    // Quick mark buttons after reveal
    document.addEventListener('DOMContentLoaded', () => {
        // Inject mark buttons in the answer area
        const area = document.getElementById('answerArea');
        const markDiv = document.createElement('div');
        markDiv.className = 'flex justify-center gap-3 mt-3';
        markDiv.id = 'markButtons';
        markDiv.innerHTML = `
            <button class="answer-btn" style="border-color:#4ECB71;color:#2e7d32" onclick="markCorrect()" data-i18n="ear-correct">✅ 我答对了</button>
            <button class="answer-btn" style="border-color:#ef4444;color:#c62828" onclick="markWrong()" data-i18n="ear-wrong">❌ 我答错了</button>
        `;
        area.appendChild(markDiv);
    });

    function markCorrect() {
        if (!answered) return;
        correctTotal++;
        updateScore();
        // Replace mark buttons with next
        document.getElementById('markButtons').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'inline-block';
        document.getElementById('nextBtn').textContent = '➡ 再来一题 ✓';
    }

    function markWrong() {
        if (!answered) return;
        wrongTotal++;
        updateScore();
        document.getElementById('markButtons').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'inline-block';
        document.getElementById('nextBtn').textContent = '➡ 再来一题 ✗';
    }

    function updateScore() {
        document.getElementById('correctCount').textContent = correctTotal;
        document.getElementById('wrongCount').textContent = wrongTotal;
        const total = correctTotal + wrongTotal;
        if (total > 0) {
            const pct = Math.round(correctTotal / total * 100);
            document.getElementById('rateText').textContent = pct + '% 正确率';
        }
    }

    // ===== BUILD REF TABLE =====
    (function buildRef() {
        const body = document.getElementById('refBody');
        INTERVALS.forEach(iv => {
            const tr = document.createElement('tr');
            [iv.semi, '<b>'+iv.name+'</b> ('+iv.abbr+')', iv.abbr,
             '<span style="font-size:12px">'+iv.quality+'</span>',
             '<span style="font-size:12px">'+iv.song+'</span>'].forEach(v => {
                const td = document.createElement('td'); td.innerHTML = v; tr.appendChild(td);
            });
            body.appendChild(tr);
        });
    })();

    buildFilter();

    // ===== THEME + LANG =====
    (function(){
        const btn=document.getElementById('themeToggle');
        const s=localStorage.getItem('metronome-theme');
        if(s==='dark'){document.body.classList.add('dark');btn.textContent='🌙';}else{btn.textContent='☀️';}
        btn.addEventListener('click',()=>{
            document.body.classList.toggle('dark');
            const d=document.body.classList.contains('dark');
            btn.textContent=d?'🌙':'☀️';
            localStorage.setItem('metronome-theme',d?'dark':'light');
        });
        const sel=document.getElementById('langSelectTop');
        const sl=localStorage.getItem('metronome-lang');
        if(sl) sel.value=sl;
        sel.addEventListener('change',()=>localStorage.setItem('metronome-lang',sel.value));
    })();
    </script>
</body>
</html>
