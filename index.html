    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f2f7f2}::-webkit-scrollbar-thumb{background:#d0ddd0;border-radius:3px}

        /* BPM Slider */
        input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:linear-gradient(to right,#4F8CFF 0%,#4F8CFF var(--fill-percent,40%),#d0ddd0 var(--fill-percent,40%),#d0ddd0 100%);outline:none;cursor:pointer}
        input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#fff;border:3px solid #4F8CFF;cursor:pointer;box-shadow:0 0 20px rgba(79,140,255,.4),0 2px 8px rgba(0,0,0,.3);transition:transform .15s ease,box-shadow .15s ease}
        input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.1);box-shadow:0 0 30px rgba(79,140,255,.6),0 2px 12px rgba(0,0,0,.4)}
        input[type="range"]::-webkit-slider-thumb:active{transform:scale(1.15);cursor:grabbing}
        input[type="range"]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:#fff;border:3px solid #4F8CFF;cursor:pointer;box-shadow:0 0 20px rgba(79,140,255,.4)}
        input.vol-slider{height:4px;background:linear-gradient(to right,#4F8CFF 0%,#4F8CFF var(--fill,50%),#d0ddd0 var(--fill,50%),#d0ddd0 100%)}input.vol-slider::-webkit-slider-thumb{width:20px;height:20px;border-width:2px}

        /* BPM Display */
        .bpm-display{font-variant-numeric:tabular-nums;text-shadow:0 0 60px rgba(79,140,255,.3);transition:text-shadow .6s ease}
        .bpm-display.playing{text-shadow:0 0 80px rgba(79,140,255,.5),0 0 20px rgba(79,140,255,.3)}

        /* Beat Dots */
        .beat-dot{width:26px;height:26px;border-radius:50%;background:#d0ddd0;transition:all .12s ease}
        .beat-dot.active{background:#4F8CFF;box-shadow:0 0 20px rgba(79,140,255,.7),0 0 6px rgba(79,140,255,.5);transform:scale(1.3)}
        .beat-dot.accent{width:32px;height:32px}
        .beat-dot.accent.active{background:#fff;box-shadow:0 0 26px rgba(255,255,255,.8),0 0 10px rgba(79,140,255,.6);transform:scale(1.4)}
        .sub-beat-dot{width:10px;height:10px;border-radius:50%;background:#d8e8d8;transition:all .1s ease}
        .sub-beat-dot.active{background:#5a8a6a;box-shadow:0 0 10px rgba(90,138,106,.6);transform:scale(1.25)}

        /* Play Pill Button */
        .btn-play-pill{padding:12px 32px;border-radius:30px;background:linear-gradient(135deg,#4F8CFF 0%,#6B5CFF 100%);color:#fff;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;box-shadow:0 4px 20px rgba(79,140,255,.35);transition:all .2s ease;letter-spacing:.02em;min-width:108px;height:48px}
        .btn-play-pill:hover{transform:scale(1.04);box-shadow:0 6px 28px rgba(79,140,255,.5)}
        .btn-play-pill:active{transform:scale(.96)}
        .btn-play-pill.playing{background:linear-gradient(135deg,#FF5C5C 0%,#FF3B3B 100%);box-shadow:0 4px 20px rgba(255,92,92,.35)}
        .btn-play-pill.playing:hover{box-shadow:0 6px 28px rgba(255,92,92,.5)}
        .btn-play-pill.training{background:linear-gradient(135deg,#4ECB71 0%,#3AAF5C 100%);box-shadow:0 4px 20px rgba(78,203,113,.35)}
        .btn-play-pill.training:hover{box-shadow:0 6px 28px rgba(78,203,113,.5)}

        /* TAP Pill Button */
        .btn-tap-pill{padding:12px 32px;border-radius:30px;background:linear-gradient(135deg,#4F8CFF 0%,#6B5CFF 100%);color:#fff;font-size:18px;font-weight:700;cursor:pointer;border:none;box-shadow:0 4px 20px rgba(79,140,255,.35);transition:all .2s ease;letter-spacing:.06em;min-width:108px;height:48px;display:flex;align-items:center;justify-content:center}
        .btn-tap-pill:hover{transform:scale(1.04);box-shadow:0 6px 28px rgba(79,140,255,.5)}
        .btn-tap-pill:active{transform:scale(.96)}
        .btn-tap-pill.tapping{background:#fff;color:#4F8CFF;animation:tapPulse .3s ease}
        @keyframes tapPulse{0%{transform:scale(1)}50%{transform:scale(.92)}100%{transform:scale(1)}}

        /* Small buttons */
        .btn-sm{padding:8px 18px;border-radius:16px;background:#e8efe8;color:#5a6a5a;font-size:14px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .2s ease;white-space:nowrap}
        .btn-sm:hover{border-color:#8a9a8a;color:#2a3a2a}
        .btn-sm.active{background:rgba(79,140,255,.15);border-color:#4F8CFF;color:#4F8CFF}

        /* Beat Presets */
        .btn-preset{padding:8px 20px;border-radius:20px;background:#e8efe8;color:#4a5a4a;font-size:14px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .2s ease}
        .btn-preset:hover{border-color:#8a9a8a;color:#2a3a2a}
        .btn-preset.active{background:rgba(79,140,255,.15);border-color:#4F8CFF;color:#4F8CFF}

        /* BPM Adj */
        .btn-bpm-adj{width:40px;height:40px;min-width:40px;min-height:40px;max-width:40px;max-height:40px;border-radius:50%;background:transparent;color:#4F8CFF;cursor:pointer;border:2px solid #4F8CFF;transition:all .15s ease;user-select:none;padding:0;margin:0;flex-shrink:0;flex-grow:0;box-sizing:border-box;display:flex;align-items:center;justify-content:center;outline:none}
        .btn-bpm-adj svg{display:block;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
        .btn-bpm-adj:hover{border-color:#3A6FCC;color:#3A6FCC;background:rgba(79,140,255,.08)}
        .btn-bpm-adj:active{transform:scale(.92);background:#4F8CFF;border-color:#4F8CFF;color:#fff}

        /* Settings toggle */
        .panel-tab{flex:1;background:none;border:none;color:#6a7a6a;cursor:pointer;font-size:15px;padding:10px 0;border-radius:8px;transition:all .2s ease;font-weight:600;text-align:center}
        .panel-tab:hover{color:#2a3a2a;background:#e8efe8}
        .panel-tab.active{background:#4F8CFF;color:#fff}
        .panel-collapse{max-height:0;overflow:hidden;transition:max-height .35s ease,opacity .35s ease;opacity:0}
        .panel-collapse.open{max-height:400px;opacity:1}

        /* Training panel */
        .training-panel{border:1px solid #c8dcc8;background:#f0f7f0}
        .train-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:#e8f0e8;outline:none;cursor:pointer}
        .train-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid #4ECB71;cursor:pointer}
        .train-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid #4ECB71;cursor:pointer}
        .btn-train{padding:6px 18px;border-radius:14px;background:#e8f0e8;color:#4ECB71;font-size:13px;font-weight:600;cursor:pointer;border:2px solid #c8e8c8;transition:all .2s ease}
        .btn-train:hover{background:#c8e8c8;border-color:#2d8a4a}
        .btn-train.active{background:#4ECB71;border-color:#4ECB71;color:#f2f7f2}

        /* Toast */
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#4F8CFF;color:#fff;padding:10px 24px;border-radius:24px;font-size:14px;font-weight:600;z-index:999;transition:transform .3s ease;pointer-events:none}
        .toast.show{transform:translateX(-50%) translateY(0)}

        @keyframes bpmPop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
        .bpm-pop{animation:bpmPop .25s ease-out}

        /* Settings panel */
        .beat-counter-btn{width:28px;height:28px;border:2px solid #C2C6D0;border-radius:50%;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#C2C6D0;padding:0;transition:all .2s ease;outline:none;flex-shrink:0}
        .beat-counter-btn:hover{border-color:#58B25D;color:#58B25D}
        .beat-counter-btn svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
        .custom-check{width:22px;height:22px;border:2px solid #C2C6D0;border-radius:5px;display:flex;align-items:center;justify-content:center;transition:all .2s ease;flex-shrink:0}
        .custom-check.checked{background:#58B25D;border-color:#58B25D}
        .custom-check.checked::after{content:'';display:block;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-bottom:2px}
        .timer-badge{background:#ECEFF6;color:#2C313C;font-weight:700;font-size:18px;padding:8px 20px;border-radius:8px;transition:all .2s ease;letter-spacing:.5px;min-width:72px;text-align:center}
        .timer-badge.disabled{background:#f5f7fa;color:#C2C6D0}
        .timer-badge.active-timer{background:#FFE0E0;color:#e04040;animation:timerPulse 1s ease-in-out infinite}
        @keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.6}}

        /* Note buttons (subdivision) */
        .note-btn{width:54px;height:54px;border-radius:50%;border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#2C313C;transition:all .2s ease;padding:0;outline:none;flex-shrink:0}
        .note-btn:hover{background:#E8EDF5;color:#2C313C}
        .note-btn.active{background:#4F8CFF;color:#fff}
        .note-btn svg{width:40px;height:40px}

        .ad-placeholder{border:1px dashed #d0ddd0;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#8a9a8a;font-size:12px}

        .btn-play-pill,.btn-tap-pill,.btn-preset,.btn-bpm-adj,.beat-dot,.btn-sm,.btn-sound,.btn-train{touch-action:manipulation;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
        input[type="range"]{touch-action:pan-x}
        main{touch-action:manipulation}

        @media(max-width:480px){
            .btn-play-pill,.btn-tap-pill{padding:12px 28px;font-size:18px;min-width:80px}
            .beat-dot{width:20px;height:20px}.beat-dot.accent{width:26px;height:26px}
            .sub-beat-dot{width:8px;height:8px}
            input[type="range"]::-webkit-slider-thumb{width:32px;height:32px}
            input[type="range"]::-moz-range-thumb{width:32px;height:32px}
            .btn-preset{padding:6px 14px;font-size:13px}
            .btn-bpm-adj{width:36px;height:36px;min-width:36px;min-height:36px;max-width:36px;max-height:36px}
            .btn-sm{padding:4px 10px;font-size:11px}
        }
        @media(max-height:500px) and (orientation:landscape){
            .bpm-display{font-size:3rem!important}
            .btn-play-pill,.btn-tap-pill{padding:10px 22px;font-size:16px;min-width:70px}
        }
    </style>

<body class="min-h-screen flex flex-col items-center justify-between py-6 px-4" style="background:#f2f7f2;">

        let currentLang = 'zh-CN';

        /** Get browser language, matching our supported list */
        function detectLang() {
            const navLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
            if (navLang.startsWith('zh')) return 'zh-CN';
            if (navLang.startsWith('ja')) return 'ja';
            if (navLang.startsWith('es')) return 'es';
            if (navLang.startsWith('pt')) return 'pt';
            return 'en';
        }

        /** Apply translations to all [data-i18n] elements */
        function applyLang(lang) {
            currentLang = lang;
            const dict = I18N[lang] || I18N['en'];

            // Update elements with data-i18n
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) {
                    if (el.tagName === 'META') {
                        el.setAttribute('content', dict[key]);
                    } else if (el.tagName === 'TITLE') {
                        document.title = dict[key];
                    } else {
                        el.textContent = dict[key];
                    }
                }
            });

            document.documentElement.lang = lang;
            document.getElementById('langSelect').value = lang;
        }

        // =============================================
        //  SettingsManager — localStorage + URL params
        // =============================================
        const SettingsManager = {
            STORAGE_KEY: 'metronome-settings',
            defaults: {
                bpm: 120,
                beatsPerBar: 4,
                subdivision: 1,
                soundType: 'classic',
                volAccent: 95,
                volNormal: 65,
                volSub: 40,
                lang: null, // set by detection
            },

            /** Load from URL params + localStorage (URL takes priority) */
            load() {
                const saved = {};
                // Try localStorage
                try {
                    const raw = localStorage.getItem(this.STORAGE_KEY);
                    if (raw) Object.assign(saved, JSON.parse(raw));
                } catch(e) {}

                // Override with URL params
                const params = new URLSearchParams(window.location.search);
                if (params.has('bpm')) saved.bpm = parseInt(params.get('bpm'));
                if (params.has('beat')) saved.beatsPerBar = parseInt(params.get('beat'));
                if (params.has('sub')) saved.subdivision = parseInt(params.get('sub'));
                if (params.has('sound')) saved.soundType = params.get('sound');
                if (params.has('va')) saved.volAccent = parseInt(params.get('va'));
                if (params.has('vn')) saved.volNormal = parseInt(params.get('vn'));
                if (params.has('vs')) saved.volSub = parseInt(params.get('vs'));
                if (params.has('lang')) saved.lang = params.get('lang');

                // Merge with defaults
                const merged = { ...this.defaults, ...saved };
                return merged;
            },

            /** Save current settings to localStorage */
            save(settings) {
                try {
                    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(settings));
                } catch(e) {}
            },

            /** Generate shareable URL */
            buildUrl(settings) {
                const url = new URL(window.location.origin + window.location.pathname);
                if (settings.bpm !== this.defaults.bpm) url.searchParams.set('bpm', settings.bpm);
                if (settings.beatsPerBar !== this.defaults.beatsPerBar) url.searchParams.set('beat', settings.beatsPerBar);
                if (settings.subdivision !== this.defaults.subdivision) url.searchParams.set('sub', settings.subdivision);
                if (settings.soundType !== this.defaults.soundType) url.searchParams.set('sound', settings.soundType);
                if (settings.volAccent !== this.defaults.volAccent) url.searchParams.set('va', settings.volAccent);
                if (settings.volNormal !== this.defaults.volNormal) url.searchParams.set('vn', settings.volNormal);
                if (settings.volSub !== this.defaults.volSub) url.searchParams.set('vs', settings.volSub);
                return url.toString();
            },
        };

        // =============================================
        //  MetronomeEngine — Web Audio API 音频引擎 v3
        //  新增：mute支持（训练模式用）
        // =============================================
        class MetronomeEngine {
            constructor() {
                this.audioCtx = null;
                this.nextNoteTime = 0;
                this.currentBeat = 0;
                this.tempo = 120;
                this.beatsPerBar = 4;
                this.isPlaying = false;
                this.timerID = null;
                this.lookAhead = 25;
                this.scheduleAhead = 0.1;
                this.subdivision = 1;
                this.subIndex = 0;
                this.soundType = 'classic';
                this.volAccent = 95;
                this.volNormal = 65;
                this.volSub = 40;
                this.accentEnabled = true;   // accent on first beat
                this.timerSeconds = 60;      // default 1 minute
                this.timerEnabled = false;
                this.timerRemaining = 60;
                this.timerInterval = null;
                this.onTimerTick = null;     // callback each second
                this.onTimerEnd = null;      // callback when timer hits 0
                this.muted = false;          // for mute trainer
                this.buffers = {};
                this.onBeatCallback = null; // (beatNumber, subIndex, subdivision)
                this.onBarCallback = null;  // (barCount) — fired when beat 0, sub 0
                this._barCount = 0;
            }

            initAudio() {
                if (this.audioCtx) return;
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                this.audioCtx = new AudioCtx();
                this._generateAllBuffers();
                // Preload + wake up speech synthesis
                if (window.speechSynthesis) {
                    speechSynthesis.getVoices();
                    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
                    // Wake-up utterance to unlock browser speech API
                    const wake = new SpeechSynthesisUtterance('');
                    wake.volume = 0;
                    speechSynthesis.speak(wake);
                }
            }

            _generateAllBuffers() {
                for (const type of ['classic', 'wood', 'cymbal', 'beep', 'voice']) {
                    this.buffers[type] = {
                        accent: this._createBuffer(type, true),
                        normal: this._createBuffer(type, false),
                        sub:    this._createBuffer(type, false),
                    };
                }
            }

            _createBuffer(type, accented) {
                const sr = this.audioCtx.sampleRate;
                let dur, freq, amp;
                const buf = this.audioCtx.createBuffer(1, Math.floor(sr * 0.08), sr);
                const d = buf.getChannelData(0);

                switch (type) {
                    case 'classic':
                        dur = accented ? 0.04 : 0.03;
                        freq = accented ? 1800 : 1200;
                        amp = accented ? 0.95 : 0.65;
                        for (let i = 0; i < Math.floor(sr * dur); i++) {
                            const t = i / sr;
                            const env = Math.exp(-t * (accented ? 90 : 120));
                            d[i] = (Math.sin(2 * Math.PI * freq * t) * 0.85 + (Math.random() * 2 - 1) * 0.15) * env * amp;
                        }
                        break;

                    case 'wood':
                        dur = accented ? 0.06 : 0.045;
                        freq = accented ? 900 : 680;
                        amp = accented ? 0.9 : 0.6;
                        for (let i = 0; i < Math.floor(sr * dur); i++) {
                            const t = i / sr;
                            const env = Math.exp(-t * 35) * (1 + 0.1 * Math.sin(2 * Math.PI * 200 * t));
                            const tone = Math.sin(2 * Math.PI * freq * t) * 0.7
                                       + Math.sin(2 * Math.PI * freq * 2.3 * t) * 0.2
                                       + Math.sin(2 * Math.PI * freq * 3.7 * t) * 0.1;
                            d[i] = tone * env * amp;
                        }
                        break;

                    case 'cymbal':
                        dur = accented ? 0.08 : 0.06;
                        amp = accented ? 0.85 : 0.5;
                        for (let i = 0; i < Math.floor(sr * dur); i++) {
                            const t = i / sr;
                            const env = Math.exp(-t * 80) + Math.exp(-t * 25) * 0.4; // metallic shimmer
                            const noise = (Math.random() * 2 - 1);
                            // High-freq metallic ring
                            const ring = Math.sin(2 * Math.PI * 6000 * t) * 0.05 + Math.sin(2 * Math.PI * 8000 * t) * 0.03;
                            d[i] = (noise * 0.8 + ring) * env * amp;
                        }
                        break;

                    case 'beep':
                        dur = accented ? 0.08 : 0.06;
                        freq = accented ? 800 : 600;
                        amp = accented ? 0.85 : 0.55;
                        for (let i = 0; i < Math.floor(sr * dur); i++) {
                            const t = i / sr;
                            // Short punchy beep with slight pitch drop (car-horn-like)
                            const env = Math.exp(-t * 60);
                            const sweep = 1 - t * 3; // slight downward pitch sweep
                            const tone = Math.sin(2 * Math.PI * freq * Math.max(0.5, sweep) * t);
                            d[i] = tone * env * amp;
                        }
                        break;

                    case 'voice':
                        dur = accented ? 0.12 : 0.08;
                        amp = accented ? 0.8 : 0.5;
                        for (let i = 0; i < Math.floor(sr * dur); i++) {
                            const t = i / sr;
                            // Vocal-like: warm mid-tone with formant-ish harmonics
                            const env = Math.exp(-t * 40);
                            const base = accented ? 400 : 320;
                            const tone = Math.sin(2 * Math.PI * base * t) * 0.5
                                       + Math.sin(2 * Math.PI * base * 2 * t) * 0.3
                                       + Math.sin(2 * Math.PI * base * 3 * t) * 0.15
                                       + Math.sin(2 * Math.PI * 650 * t) * 0.2;  // formant
                            d[i] = tone * env * amp * 0.7;
                        }
                        break;
                }
                return buf;
            }

            _playClick(buffer, time, volumeMult) {
                const src = this.audioCtx.createBufferSource();
                const gain = this.audioCtx.createGain();
                src.buffer = buffer;
                gain.gain.value = this.muted ? 0 : volumeMult;
                src.connect(gain);
                gain.connect(this.audioCtx.destination);
                src.start(time);
            }

            /** Speak beat number using SpeechSynthesis */
            _speakBeat(beatNumber) {
                if (!this.isPlaying || this.soundType !== 'voice') return;
                const num = beatNumber + 1;
                const utt = new SpeechSynthesisUtterance(String(num));
                utt.rate = 1.2;
                utt.pitch = 1.0;
                utt.volume = this.muted ? 0 : 0.8;
                const voices = speechSynthesis.getVoices();
                const zhVoice = voices.find(v => v.lang.startsWith('zh') || v.lang.startsWith('en'));
                if (zhVoice) utt.voice = zhVoice;
                speechSynthesis.speak(utt);
            }

            _nextNote() {
                const secondsPerBeat = 60.0 / this.tempo;
                const secondsPerSub = secondsPerBeat / this.subdivision;
                this.nextNoteTime += secondsPerSub;
                this.subIndex++;
                if (this.subIndex >= this.subdivision) {
                    this.subIndex = 0;
                    this.currentBeat = (this.currentBeat + 1) % this.beatsPerBar;
                    // Fire bar callback when returning to beat 0
                    if (this.currentBeat === 0 && this.onBarCallback) {
                        this._barCount++;
                        // Schedule bar callback slightly after the beat
                        const barTime = this.nextNoteTime;
                        const barDelay = Math.max(0, (barTime - this.audioCtx.currentTime) * 1000);
                        setTimeout(() => this.onBarCallback(this._barCount), barDelay);
                    }
                }
            }

            _getBuffer() {
                const bufs = this.buffers[this.soundType] || this.buffers['classic'];
                if (this.subIndex === 0) {
                    if (this.currentBeat === 0 && this.accentEnabled) return bufs.accent;
                    return bufs.normal;
                }
                return bufs.sub;
            }

            _getVolume(isAccent, isSub) {
                if (isSub) return this.volSub / 100;
                return isAccent ? this.volAccent / 100 : this.volNormal / 100;
            }

            _scheduleNote(time, beatNumber, subIndex) {
                const isAccent = beatNumber === 0 && subIndex === 0;
                const isSub = subIndex > 0;
                this._playClick(this._getBuffer(), time, this._getVolume(isAccent, isSub));

                // Voice: use speech synthesis on main beats
                if (this.soundType === 'voice' && subIndex === 0 && window.speechSynthesis) {
                    this._speakBeat(beatNumber);
                }

                if (this.onBeatCallback) {
                    const delayMs = Math.max(0, (time - this.audioCtx.currentTime) * 1000);
                    setTimeout(() => this.onBeatCallback(beatNumber, subIndex, this.subdivision), delayMs);
                }
            }

            _scheduler() {
                while (this.nextNoteTime < this.audioCtx.currentTime + this.scheduleAhead) {
                    this._scheduleNote(this.nextNoteTime, this.currentBeat, this.subIndex);
                    this._nextNote();
                }
            }

            start() {
                if (!this.audioCtx) this.initAudio();
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
                if (this.isPlaying) return;
                this.isPlaying = true;
                this.currentBeat = 0;
                this.subIndex = 0;
                this._barCount = 0;
                this.nextNoteTime = this.audioCtx.currentTime + 0.05;
                this._scheduler();
                this.timerID = setInterval(() => this._scheduler(), this.lookAhead);
            }

            stop() {
                this.isPlaying = false;
                if (this.timerID) { clearInterval(this.timerID); this.timerID = null; }
            }

            toggle() {
                if (this.isPlaying) { this.stop(); } else { this.start(); }
                return this.isPlaying;
            }

            setTempo(bpm) { this.tempo = Math.max(20, Math.min(300, bpm)); return this.tempo; }
            setBeatsPerBar(b) { this.beatsPerBar = Math.max(1, Math.min(12, b)); if (this.currentBeat >= this.beatsPerBar) this.currentBeat = 0; return this.beatsPerBar; }
            setSubdivision(s) {
                // Map UI buttons to engine subdivision count:
                // 1→1  2→2  3→3  4→4  5,6→2  7,8,9→3  10,11→4
                const map = {1:1,2:2,3:3,4:4,5:2,6:2,7:3,8:3,9:3,10:4,11:4};
                this.subdivision = map[s] || 1;
                this._uiSubType = s; // store original UI type
                this.subIndex = 0;
                return this.subdivision;
            }
            setSoundType(t) { if (['classic','wood','cymbal','beep','voice'].includes(t)) this.soundType = t; }
            setVolumes(a, n, s) { this.volAccent = Math.max(10,Math.min(100,a)); this.volNormal = Math.max(10,Math.min(100,n)); this.volSub = Math.max(10,Math.min(100,s)); }
            setMuted(m) { this.muted = !!m; }

            startTimer() {
                if (!this.timerEnabled) return;
                this.timerRemaining = this.timerSeconds;
                this._clearTimer();
                this.timerInterval = setInterval(() => {
                    this.timerRemaining--;
                    if (this.onTimerTick) this.onTimerTick(this.timerRemaining);
                    if (this.timerRemaining <= 0) {
                        this._clearTimer();
                        if (this.onTimerEnd) this.onTimerEnd();
                    }
                }, 1000);
            }

            pauseTimer() {
                this._clearTimer();
                this.timerRemaining = this.timerSeconds;
                if (this.onTimerTick) this.onTimerTick(this.timerRemaining);
            }

            _clearTimer() {
                if (this.timerInterval) { clearInterval(this.timerInterval); this.timerInterval = null; }
            }

            destroy() {
                this.stop();
                if (this.audioCtx && this.audioCtx.state !== 'closed') this.audioCtx.close();
                this.audioCtx = null; this.buffers = {};
            }
        }

        // =============================================
        //  TrainingController — 训练模式
        // =============================================
        class TrainingController {
            constructor(engine, ui) {
                this.engine = engine;
                this.ui = ui;
                this.mode = 'mute'; // 'mute' | 'speed'
                this.running = false;

                // Mute trainer state
                this.mutePlayBars = 2;
                this.muteSilenceBars = 2;
                this.muteBarCount = 0;
                this.muteInSilence = false;

                // Speed trainer state
                this.speedStartBpm = 60;
                this.speedEndBpm = 160;
                this.speedStepBars = 2;
                this.speedStepBpm = 5;
                this.speedBarCount = 0;
                this.speedCurrentBpm = 60;

                // DOM
                this.$panel = document.getElementById('trainPanel');
                this.$toggle = document.getElementById('trainToggle');
                this.$tabs = document.getElementById('trainTabs').querySelectorAll('.btn-train');
                this.$mutePanel = document.getElementById('trainMutePanel');
                this.$speedPanel = document.getElementById('trainSpeedPanel');
                this.$mutePlayBars = document.getElementById('mutePlayBars');
                this.$muteSilenceBars = document.getElementById('muteSilenceBars');
                this.$muteStartBtn = document.getElementById('muteStartBtn');
                this.$muteStatus = document.getElementById('muteStatus');
                this.$speedStartBpm = document.getElementById('speedStartBpm');
                this.$speedEndBpm = document.getElementById('speedEndBpm');
                this.$speedStepBars = document.getElementById('speedStepBars');
                this.$speedStepBpm = document.getElementById('speedStepBpm');
                this.$speedStartBtn = document.getElementById('speedStartBtn');
                this.$speedStatus = document.getElementById('speedStatus');

                this._bind();
            }

            _bind() {
                // Mode tabs
                this.$tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        this.mode = tab.dataset.train;
                        this.$tabs.forEach(t => t.classList.toggle('active', t === tab));
                        this.$mutePanel.classList.toggle('hidden', this.mode !== 'mute');
                        this.$speedPanel.classList.toggle('hidden', this.mode !== 'speed');
                    });
                });

                // Mute trainer start
                this.$muteStartBtn.addEventListener('click', () => this._toggleMuteTrainer());

                // Speed trainer start
                this.$speedStartBtn.addEventListener('click', () => this._toggleSpeedTrainer());

                // Engine bar callback
                this.engine.onBarCallback = (barCount) => {
                    if (this.running) {
                        if (this.mode === 'mute') this._onMuteBar();
                        if (this.mode === 'speed') this._onSpeedBar();
                    }
                };
            }

            /** Update training button label */
            _setTrainBtnText(btn, isRunning) {
                const stopText = {'zh-CN':'停止训练','en':'Stop','ja':'停止','es':'Detener','pt':'Parar'}[currentLang] || 'Stop';
                const startText = I18N[currentLang]?.['train-start'] || 'Start Training';
                btn.textContent = isRunning ? stopText : startText;
                btn.classList.toggle('active', isRunning);
            }

            // ======== Mute Trainer ========
            _toggleMuteTrainer() {
                if (this.running && this.mode === 'mute') {
                    this._stopMuteTrainer();
                    return;
                }
                this.mode = 'mute';
                this._startMuteTrainer();
            }

            _startMuteTrainer() {
                this.mutePlayBars = Math.max(1, Math.min(8, parseInt(this.$mutePlayBars.value) || 2));
                this.muteSilenceBars = Math.max(1, Math.min(8, parseInt(this.$muteSilenceBars.value) || 2));
                this.muteBarCount = 0;
                this.muteInSilence = false;
                this.running = true;

                // Ensure engine is playing
                if (!this.engine.isPlaying) {
                    this.engine.initAudio();
                    this.engine.start();
                    this.ui.setPlayingState(true);
                }

                this.engine.setMuted(false);
                this.$muteStatus.classList.remove('hidden');
                this.$muteStatus.textContent = this._muteStatusText('play', 1);
                this._setTrainBtnText(this.$muteStartBtn, true);
                this.ui.$playBtn.classList.add('training');
            }

            _stopMuteTrainer() {
                this.running = false;
                this.engine.setMuted(false);
                this.$muteStatus.classList.add('hidden');
                this._setTrainBtnText(this.$muteStartBtn, false);
                this.ui.$playBtn.classList.remove('training');
                // Don't stop engine — user might still want to play
            }

            _onMuteBar() {
                this.muteBarCount++;
                const cycleLen = this.mutePlayBars + this.muteSilenceBars;
                const pos = (this.muteBarCount - 1) % cycleLen;

                if (pos < this.mutePlayBars) {
                    // Play phase
                    this.engine.setMuted(false);
                    this.muteInSilence = false;
                    this.$muteStatus.textContent = this._muteStatusText('play', pos + 1);
                } else {
                    // Silence phase
                    this.engine.setMuted(true);
                    this.muteInSilence = true;
                    this.$muteStatus.textContent = this._muteStatusText('silence', pos - this.mutePlayBars + 1);
                }
            }

            _muteStatusText(phase, bar) {
                const playWords = {'zh-CN':['🔊','播放中'],'en':['🔊','Playing'],'ja':['🔊','再生中'],'es':['🔊','Sonando'],'pt':['🔊','Tocando']};
                const muteWords = {'zh-CN':['🔇','静音中'],'en':['🔇','Muted'],'ja':['🔇','消音中'],'es':['🔇','Silencio'],'pt':['🔇','Silêncio']};
                const barWord = {'zh-CN':'小节','en':'bar','ja':'小節','es':'comp.','pt':'comp.'};
                const dict = phase === 'play' ? playWords : muteWords;
                const words = dict[currentLang] || dict['en'];
                return `${words[0]} ${words[1]} · ${bar}/${phase === 'play' ? this.mutePlayBars : this.muteSilenceBars} ${barWord[currentLang] || 'bar'}`;
            }

            // ======== Speed Trainer ========
            _toggleSpeedTrainer() {
                if (this.running && this.mode === 'speed') {
                    this._stopSpeedTrainer();
                    return;
                }
                this.mode = 'speed';
                this._startSpeedTrainer();
            }

            _startSpeedTrainer() {
                this.speedStartBpm = Math.max(20, Math.min(280, parseInt(this.$speedStartBpm.value) || 60));
                this.speedEndBpm = Math.max(30, Math.min(300, parseInt(this.$speedEndBpm.value) || 160));
                this.speedStepBars = Math.max(1, Math.min(8, parseInt(this.$speedStepBars.value) || 2));
                this.speedStepBpm = Math.max(1, Math.min(20, parseInt(this.$speedStepBpm.value) || 5));
                this.speedBarCount = 0;
                this.speedCurrentBpm = this.speedStartBpm;
                this.running = true;

                // Set start BPM
                this.ui.setBpm(this.speedStartBpm);

                if (!this.engine.isPlaying) {
                    this.engine.initAudio();
                    this.engine.start();
                    this.ui.setPlayingState(true);
                }

                this.$speedStatus.classList.remove('hidden');
                this.$speedStatus.textContent = this._speedStatusText();
                this._setTrainBtnText(this.$speedStartBtn, true);
                this.ui.$playBtn.classList.add('training');
            }

            _stopSpeedTrainer() {
                this.running = false;
                this.$speedStatus.classList.add('hidden');
                this._setTrainBtnText(this.$speedStartBtn, false);
                this.ui.$playBtn.classList.remove('training');
            }

            _onSpeedBar() {
                this.speedBarCount++;
                if (this.speedBarCount >= this.speedStepBars) {
                    this.speedBarCount = 0;
                    this.speedCurrentBpm += this.speedStepBpm;

                    if (this.speedCurrentBpm >= this.speedEndBpm) {
                        this.speedCurrentBpm = this.speedEndBpm;
                        this.ui.setBpm(this.speedEndBpm);
                        this._stopSpeedTrainer();
                        return;
                    }

                    this.ui.setBpm(this.speedCurrentBpm);
                    this.$speedStatus.textContent = this._speedStatusText();
                }
            }

            _speedStatusText() {
                const currentWord = {'zh-CN':'当前','en':'Now','ja':'現在','es':'Ahora','pt':'Agora'}[currentLang] || 'Now';
                const targetWord = {'zh-CN':'目标','en':'Target','ja':'目標','es':'Meta','pt':'Meta'}[currentLang] || 'Target';
                return `${currentWord}: ${this.speedCurrentBpm} BPM → ${targetWord}: ${this.speedEndBpm} BPM`;
            }

            /** Cleanup when engine stops externally */
            onEngineStop() {
                if (this.running) {
                    this.running = false;
                    this.engine.setMuted(false);
                    this.$muteStatus.classList.add('hidden');
                    this.$speedStatus.classList.add('hidden');
                    this._setTrainBtnText(this.$muteStartBtn, false);
                    this._setTrainBtnText(this.$speedStartBtn, false);
                    this.ui.$playBtn.classList.remove('training');
                }
            }
        }

        // =============================================
        //  UIController — DOM 交互 v3
        // =============================================
        class UIController {
            constructor(engine) {
                this.engine = engine;
                this.bpm = 120;
                this.beatsPerBar = 4;
                this.subdivision = 1;
                this.soundType = 'classic';
                this.tapTimes = [];
                this.tapTimeout = null;
                this._saveTimeout = null;
                this._toastTimer = null;

                // DOM
                this.$bpmDisplay = document.getElementById('bpmDisplay');
                this.$bpmSlider = document.getElementById('bpmSlider');
                this.$bpmLabel = document.getElementById('bpmLabel');
                this.$beatIndicators = document.getElementById('beatIndicators');
                this.$subBeatIndicators = document.getElementById('subBeatIndicators');

                this.$playBtn = document.getElementById('playBtn');
                this.$playIcon = document.getElementById('playIcon');
                this.$tapBtn = document.getElementById('tapBtn');

                this.$subBtns = document.querySelectorAll('.note-btn');
                this.$soundBtns = document.querySelectorAll('.btn-sound');

                this.$panelTabs = document.querySelectorAll('.panel-tab');
                this.$volPanel = document.getElementById('volPanel');
                this.$trainPanel = document.getElementById('trainPanel');
                this.$soundPanel = document.getElementById('soundPanel');
                this.$volAccent = document.getElementById('volAccent');
                this.$volNormal = document.getElementById('volNormal');
                this.$volSub = document.getElementById('volSub');
                this.$volAccentVal = document.getElementById('volAccentVal');
                this.$volNormalVal = document.getElementById('volNormalVal');
                this.$volSubVal = document.getElementById('volSubVal');
                this.$shareBtn = document.getElementById('shareBtn');
                this.$toast = document.getElementById('toast');
                this.$langSelect = document.getElementById('langSelect');
                this.$beatCountDisplay = document.getElementById('beatCountDisplay');
                this.$accentCheck = document.getElementById('accentCheck');
                this.$accentCheckMark = document.getElementById('accentCheckMark');
                this.$timerCheck = document.getElementById('timerCheck');
                this.$timerCheckMark = document.getElementById('timerCheckMark');
                this.$timerDisplay = document.getElementById('timerDisplay');
                this.timerEditing = false;

                this.tempoLabels = [
                    [20,40,'Larghissimo'],[40,60,'Largo'],[60,66,'Adagio'],
                    [66,76,'Andante'],[76,108,'Moderato'],[108,120,'Allegro'],
                    [120,168,'Vivace'],[168,200,'Presto'],[200,300,'Prestissimo'],
                ];

                this._loadSettings();
                this.trainingCtrl = new TrainingController(engine, this);
                this.init();
            }

            init() {
                this._updateBpmLabel();
                this._updateBeatIndicators();
                this._updateSubBeatIndicators();
                this._updateSliderFill();
                this._bindEvents();
                this._bindKeyboard();
                // Init checkboxes
                this.$accentCheckMark.classList.add('checked');
                this._updateTimerDisplay();
            }

            /** Load settings from localStorage/URL, apply to UI & engine */
            _loadSettings() {
                const s = SettingsManager.load();

                // Language
                const lang = s.lang || detectLang();
                currentLang = lang;
                applyLang(lang);
                if (!s.lang) {
                    // Save detected language
                    try { localStorage.setItem('metronome-lang', lang); } catch(e) {}
                }

                // Apply settings
                this.bpm = s.bpm;
                this.beatsPerBar = s.beatsPerBar;
                this.subdivision = s.subdivision;
                this.soundType = s.soundType;

                // Engine
                this.engine.setTempo(s.bpm);
                this.engine.setBeatsPerBar(s.beatsPerBar);
                this.engine.setSubdivision(s.subdivision);
                this.engine.setSoundType(s.soundType);
                this.engine.setVolumes(s.volAccent, s.volNormal, s.volSub);

                // UI — update after DOM is ready
                const self = this;
                requestAnimationFrame(() => {
                    self.$bpmDisplay.textContent = s.bpm;
                    self.$bpmSlider.value = s.bpm;

                    self.$volAccent.value = s.volAccent;
                    self.$volNormal.value = s.volNormal;
                    self.$volSub.value = s.volSub;
                    self.$volAccentVal.textContent = s.volAccent;
                    self.$volNormalVal.textContent = s.volNormal;
                    self.$volSubVal.textContent = s.volSub;

                    // Highlight correct buttons
                    self.$subBtns.forEach(b => b.classList.toggle('active', parseInt(b.dataset.sub) === s.subdivision));
                    self.$soundBtns.forEach(b => b.classList.toggle('active', b.dataset.sound === s.soundType));

                    self._updateSubBeatIndicators();
                    self._updateBeatIndicators();
                    if (self.$beatCountDisplay) self.$beatCountDisplay.textContent = s.beatsPerBar;
                });
            }

            /** Save current settings to localStorage, debounced */
            _scheduleSave() {
                clearTimeout(this._saveTimeout);
                this._saveTimeout = setTimeout(() => {
                    SettingsManager.save({
                        bpm: this.bpm,
                        beatsPerBar: this.beatsPerBar,
                        subdivision: this.subdivision,
                        soundType: this.soundType,
                        volAccent: parseInt(this.$volAccent.value),
                        volNormal: parseInt(this.$volNormal.value),
                        volSub: parseInt(this.$volSub.value),
                        lang: currentLang,
                    });
                }, 500);
            }

            /** Show toast notification */
            _toast(msg) {
                this.$toast.textContent = msg;
                this.$toast.classList.add('show');
                clearTimeout(this._toastTimer);
                this._toastTimer = setTimeout(() => this.$toast.classList.remove('show'), 2000);
            }

            // ======== BPM ========
            setBpm(val) {
                const newBpm = Math.max(20, Math.min(300, Math.round(val)));
                if (newBpm === this.bpm) return;
                this.bpm = newBpm;
                this.engine.setTempo(newBpm);
                this.$bpmDisplay.textContent = newBpm;
                this.$bpmSlider.value = newBpm;
                this._updateBpmLabel();
                this._updateSliderFill();
                this.$bpmDisplay.classList.remove('bpm-pop');
                void this.$bpmDisplay.offsetWidth;
                this.$bpmDisplay.classList.add('bpm-pop');
                this._scheduleSave();
            }

            _updateBpmLabel() {
                let label = '';
                for (const [min, max, name] of this.tempoLabels) {
                    if (this.bpm >= min && this.bpm < max) { label = name; break; }
                }
                this.$bpmLabel.textContent = label || '';
            }

            _updateSliderFill() {
                const pct = ((this.bpm - 20) / (300 - 20)) * 100;
                this.$bpmSlider.style.setProperty('--fill-percent', pct + '%');
            }

            // ======== Beats Per Bar ========
            setBeatsPerBar(val) {
                const beats = Math.max(1, Math.min(12, Math.round(val)));
                if (beats === this.beatsPerBar) return;
                this.beatsPerBar = beats;
                this.engine.setBeatsPerBar(beats);

                this._updateBeatIndicators();
                this._updateSubBeatIndicators();
                if (this.$beatCountDisplay) this.$beatCountDisplay.textContent = beats;

                this._scheduleSave();
            }

            _updateTimerDisplay(remaining) {
                const secs = remaining !== undefined ? remaining : this.engine.timerSeconds;
                const min = Math.floor(secs / 60);
                const s = secs % 60;
                this.$timerDisplay.textContent = min + ':' + (s < 10 ? '0' : '') + s;
                if (this.engine.timerEnabled && this.engine.isPlaying && secs <= 10 && secs > 0) {
                    this.$timerDisplay.classList.add('active-timer');
                } else {
                    this.$timerDisplay.classList.remove('active-timer');
                }
            }

            // ======== Subdivision ========
            setSubdivision(sub) {
                const val = Math.max(1, Math.min(11, Math.round(sub)));
                if (val === this.subdivision) return;
                this.subdivision = val;
                this.engine.setSubdivision(val);
                this._updateSubBeatIndicators();
                this.$subBtns.forEach(btn => {
                    btn.classList.toggle('active', parseInt(btn.dataset.sub) === val);
                });
                this._scheduleSave();
            }

            // ======== Sound ========
            setSound(type) {
                this.soundType = type;
                this.engine.setSoundType(type);
                this.$soundBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.sound === type);
                });
                this._scheduleSave();
            }

            // ======== Volume ========
            setVolumes() {
                const a = parseInt(this.$volAccent.value);
                const n = parseInt(this.$volNormal.value);
                const s = parseInt(this.$volSub.value);
                this.engine.setVolumes(a, n, s);
                this.$volAccentVal.textContent = a;
                this.$volNormalVal.textContent = n;
                this.$volSubVal.textContent = s;
                // Update slider fill
                this.$volAccent.style.setProperty('--fill', ((a-10)/90*100)+'%');
                this.$volNormal.style.setProperty('--fill', ((n-10)/90*100)+'%');
                this.$volSub.style.setProperty('--fill', ((s-10)/90*100)+'%');
                this._scheduleSave();
            }

            // ======== Beat Indicators ========
            _updateBeatIndicators() {
                this.$beatIndicators.innerHTML = '';
                for (let i = 0; i < this.beatsPerBar; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'beat-dot' + (i === 0 ? ' accent' : '');
                    dot.dataset.beat = i;
                    this.$beatIndicators.appendChild(dot);
                }
            }

            _updateSubBeatIndicators() {
                this.$subBeatIndicators.innerHTML = '';
                if (this.subdivision <= 1) {
                    this.$subBeatIndicators.classList.add('hidden');
                    return;
                }
                this.$subBeatIndicators.classList.remove('hidden');
                const subsPerBeat = this.subdivision - 1;
                for (let b = 0; b < this.beatsPerBar; b++) {
                    const group = document.createElement('div');
                    group.className = 'flex items-center gap-1';
                    for (let s = 0; s < subsPerBeat; s++) {
                        const dot = document.createElement('div');
                        dot.className = 'sub-beat-dot';
                        dot.dataset.beat = b;
                        dot.dataset.sub = s + 1;
                        group.appendChild(dot);
                    }
                    this.$subBeatIndicators.appendChild(group);
                    if (b < this.beatsPerBar - 1) {
                        const spacer = document.createElement('div');
                        spacer.style.width = '6px';
                        this.$subBeatIndicators.appendChild(spacer);
                    }
                }
            }

            highlightBeat(beatNumber, subIndex, subdivision) {
                const dots = this.$beatIndicators.querySelectorAll('.beat-dot');
                dots.forEach((dot, i) => {
                    if (i === beatNumber && subIndex === 0) {
                        dot.classList.add('active');
                        setTimeout(() => dot.classList.remove('active'), 120);
                    } else if (subIndex === 0) {
                        dot.classList.remove('active');
                    }
                });

                if (subdivision > 1) {
                    const subDots = this.$subBeatIndicators.querySelectorAll('.sub-beat-dot');
                    subDots.forEach(dot => {
                        if (parseInt(dot.dataset.beat) === beatNumber && parseInt(dot.dataset.sub) === subIndex) {
                            dot.classList.add('active');
                            setTimeout(() => dot.classList.remove('active'), 100);
                        }
                    });
                }
            }

            // ======== Play State ========
            setPlayingState(playing) {
                if (playing) {
                    this.$playBtn.classList.add('playing');
                    this.$playIcon.textContent = '⏸';
                    this.$bpmDisplay.classList.add('playing');
                    // Start timer if enabled
                    if (this.engine.timerEnabled) this.engine.startTimer();
                } else {
                    this.$playBtn.classList.remove('playing');
                    this.$playIcon.textContent = '▶';
                    this.$bpmDisplay.classList.remove('playing');
                    this.$beatIndicators.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active'));
                    if (this.$subBeatIndicators) {
                        this.$subBeatIndicators.querySelectorAll('.sub-beat-dot').forEach(d => d.classList.remove('active'));
                    }
                    // Pause timer (reset to set time)
                    if (this.engine.timerEnabled) this.engine.pauseTimer();
                    // Notify training controller
                    if (this.trainingCtrl) this.trainingCtrl.onEngineStop();
                }
            }

            // ======== Tap Tempo ========
            handleTap() {
                const now = performance.now();
                if (this.tapTimes.length > 0 && (now - this.tapTimes[this.tapTimes.length - 1]) > 2000) {
                    this.tapTimes = [];
                }
                this.tapTimes.push(now);
                if (this.tapTimes.length > 8) this.tapTimes.shift();
                if (this.tapTimes.length >= 2) {
                    const intervals = [];
                    for (let i = 1; i < this.tapTimes.length; i++) {
                        intervals.push(this.tapTimes[i] - this.tapTimes[i - 1]);
                    }
                    const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
                    const bpm = Math.round(60000 / avg);
                    if (bpm >= 20 && bpm <= 300) this.setBpm(bpm);
                }
                this.$tapBtn.classList.add('tapping');
                clearTimeout(this.tapTimeout);
                this.tapTimeout = setTimeout(() => this.$tapBtn.classList.remove('tapping'), 300);
            }

            // ======== Share ========
            _share() {
                const settings = {
                    bpm: this.bpm,
                    beatsPerBar: this.beatsPerBar,
                    subdivision: this.subdivision,
                    soundType: this.soundType,
                    volAccent: parseInt(this.$volAccent.value),
                    volNormal: parseInt(this.$volNormal.value),
                    volSub: parseInt(this.$volSub.value),
                };
                const url = SettingsManager.buildUrl(settings);

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(url).then(() => {
                        this._toast({'zh-CN':'✅ 链接已复制到剪贴板','en':'✅ Link copied!','ja':'✅ リンクをコピーしました','es':'✅ Enlace copiado','pt':'✅ Link copiado'}[currentLang]);
                    }).catch(() => {
                        this._toast(url);
                    });
                } else {
                    // Fallback
                    const ta = document.createElement('textarea');
                    ta.value = url; ta.style.position = 'fixed'; ta.style.left = '-9999px';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    this._toast({'zh-CN':'✅ 链接已复制','en':'✅ Link copied!','ja':'✅ コピー完了','es':'✅ Copiado','pt':'✅ Copiado'}[currentLang]);
                }
            }

            // ======== Events ========
            _bindEvents() {
                this.$playBtn.addEventListener('click', () => {
                    this.engine.initAudio();
                    const playing = this.engine.toggle();
                    this.setPlayingState(playing);
                    if (!playing && this.trainingCtrl) this.trainingCtrl.onEngineStop();
                });

                this.$tapBtn.addEventListener('click', () => {
                    this.engine.initAudio();
                    this.handleTap();
                });

                this.$bpmSlider.addEventListener('input', () => {
                    this.setBpm(parseInt(this.$bpmSlider.value));
                });

                document.getElementById('bpmUp1').addEventListener('click', () => this.setBpm(this.bpm + 1));
                document.getElementById('bpmDown1').addEventListener('click', () => this.setBpm(this.bpm - 1));
                document.getElementById('bpmUp10').addEventListener('click', () => this.setBpm(this.bpm + 10));
                document.getElementById('bpmDown10').addEventListener('click', () => this.setBpm(this.bpm - 10));

                this.$bpmDisplay.addEventListener('click', () => this._showBpmInput());
                this.$bpmDisplay.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') this._showBpmInput();
                });

                this.$subBtns.forEach(btn => {
                    btn.addEventListener('click', () => this.setSubdivision(parseInt(btn.dataset.sub)));
                });

                this.$soundBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.engine.initAudio();
                        this.setSound(btn.dataset.sound);
                    });
                });

                this.$volAccent.addEventListener('input', () => this.setVolumes());
                this.$volNormal.addEventListener('input', () => this.setVolumes());
                this.$volSub.addEventListener('input', () => this.setVolumes());

                // Panel tab switching — dropdown pattern
                this._openPanel = 'vol'; // currently open panel
                this.$panelTabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        const panelName = tab.dataset.panel;
                        // If clicking the already-open panel, close it
                        if (this._openPanel === panelName) {
                            this._openPanel = null;
                            this.$panelTabs.forEach(t => t.classList.remove('active'));
                            this.$volPanel.classList.remove('open');
                            this.$trainPanel.classList.remove('open');
                            this.$soundPanel.classList.remove('open');
                            return;
                        }
                        // Otherwise, switch to the clicked panel
                        this._openPanel = panelName;
                        this.$panelTabs.forEach(t => t.classList.toggle('active', t.dataset.panel === panelName));
                        this.$volPanel.classList.toggle('open', panelName === 'vol');
                        this.$trainPanel.classList.toggle('open', panelName === 'train');
                        this.$soundPanel.classList.toggle('open', panelName === 'sound');
                    });
                });

                this.$shareBtn.addEventListener('click', () => this._share());

                // Language selector
                this.$langSelect.addEventListener('change', () => {
                    const lang = this.$langSelect.value;
                    applyLang(lang);
                    try { localStorage.setItem('metronome-lang', lang); } catch(e) {}
                });

                // Beat counter +/−
                document.getElementById('beatMinus').addEventListener('click', () => {
                    if (this.beatsPerBar > 1) this.setBeatsPerBar(this.beatsPerBar - 1);
                });
                document.getElementById('beatPlus').addEventListener('click', () => {
                    if (this.beatsPerBar < 12) this.setBeatsPerBar(this.beatsPerBar + 1);
                });

                // Accent checkbox
                this.$accentCheck.addEventListener('change', () => {
                    const checked = this.$accentCheck.checked;
                    this.engine.accentEnabled = checked;
                    this.$accentCheckMark.classList.toggle('checked', checked);
                });

                // Timer checkbox
                this.$timerCheck.addEventListener('change', () => {
                    const checked = this.$timerCheck.checked;
                    this.engine.timerEnabled = checked;
                    this.$timerCheckMark.classList.toggle('checked', checked);
                    this.$timerDisplay.classList.toggle('disabled', !checked);
                    if (checked) {
                        this.engine.timerRemaining = this.engine.timerSeconds;
                        this._updateTimerDisplay();
                    }
                });

                // Timer display click → edit
                this.$timerDisplay.addEventListener('click', () => {
                    if (this.timerEditing) return;
                    this.timerEditing = true;
                    const current = this.engine.timerSeconds;
                    const min = Math.floor(current / 60);
                    const sec = current % 60;
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = min + ':' + (sec < 10 ? '0' : '') + sec;
                    input.style.cssText = 'width:56px;text-align:center;font-weight:600;font-size:14px;border:2px solid #58B25D;border-radius:6px;padding:4px 6px;outline:none;background:#fff;color:#2C313C;';
                    this.$timerDisplay.replaceWith(input);
                    input.focus();
                    input.select();
                    const commit = () => {
                        const parts = input.value.split(':');
                        let mins = parseInt(parts[0]) || 0;
                        let secs = parts.length > 1 ? (parseInt(parts[1]) || 0) : 0;
                        if (mins < 0) mins = 0;
                        if (mins > 99) mins = 99;
                        if (secs < 0) secs = 0;
                        if (secs > 59) secs = 59;
                        const total = mins * 60 + secs;
                        this.engine.timerSeconds = Math.max(1, total);
                        this.engine.timerRemaining = this.engine.timerSeconds;
                        input.replaceWith(this.$timerDisplay);
                        this._updateTimerDisplay();
                        this.timerEditing = false;
                    };
                    input.addEventListener('blur', commit);
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') input.blur();
                        if (e.key === 'Escape') { input.replaceWith(this.$timerDisplay); this.timerEditing = false; }
                    });
                });

                // Timer tick callback
                this.engine.onTimerTick = (remaining) => {
                    this._updateTimerDisplay(remaining);
                };

                // Timer end callback
                this.engine.onTimerEnd = () => {
                    this.engine.stop();
                    this.setPlayingState(false);
                    this.engine.timerRemaining = this.engine.timerSeconds;
                    this._updateTimerDisplay();
                };

                // Engine beat callback
                this.engine.onBeatCallback = (beatNumber, subIndex, subdivision) => {
                    this.highlightBeat(beatNumber, subIndex, subdivision);
                };
            }

            _showBpmInput() {
                const input = document.createElement('input');
                input.type = 'number'; input.min = 20; input.max = 300; input.value = this.bpm;
                input.className = 'text-8xl sm:text-9xl font-extrabold text-center bg-transparent border-b-2 border-accent text-gray-900 w-full outline-none';
                input.style.cssText = 'font-variant-numeric:tabular-nums;-moz-appearance:textfield;';
                input.setAttribute('inputmode', 'numeric');
                this.$bpmDisplay.replaceWith(input);
                input.focus(); input.select();

                const commit = () => {
                    const val = parseInt(input.value);
                    if (!isNaN(val)) this.setBpm(val);
                    input.replaceWith(this.$bpmDisplay);
                    this.$bpmDisplay.textContent = this.bpm;
                };
                input.addEventListener('blur', commit);
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') input.blur();
                    if (e.key === 'Escape') { input.value = this.bpm; input.blur(); }
                });
            }

            // ======== Keyboard ========
            _bindKeyboard() {
                document.addEventListener('keydown', (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

                    switch (e.code) {
                        case 'Space':
                            e.preventDefault();
                            this.engine.initAudio();
                            const playing = this.engine.toggle();
                            this.setPlayingState(playing);
                            if (!playing && this.trainingCtrl) this.trainingCtrl.onEngineStop();
                            break;

                        case 'ArrowUp':
                            e.preventDefault();
                            this.setBpm(this.bpm + (e.shiftKey ? 10 : 1));
                            break;
                        case 'ArrowDown':
                            e.preventDefault();
                            this.setBpm(this.bpm - (e.shiftKey ? 10 : 1));
                            break;
                        case 'ArrowRight':
                            e.preventDefault();
                            this.setBpm(this.bpm + (e.shiftKey ? 10 : 1));
                            break;
                        case 'ArrowLeft':
                            e.preventDefault();
                            this.setBpm(this.bpm - (e.shiftKey ? 10 : 1));
                            break;

                        case 'KeyT':
                            e.preventDefault();
                            this.engine.initAudio();
                            this.handleTap();
                            break;

                        case 'Digit1': case 'Numpad1':
                            e.preventDefault();
                            this.setSubdivision(1);
                            break;
                        case 'Digit2': case 'Numpad2':
                            e.preventDefault();
                            this.setSubdivision(2);
                            break;
                        case 'Digit3': case 'Numpad3':
                            e.preventDefault();
                            this.setSubdivision(3);
                            break;
                        case 'Digit4': case 'Numpad4':
                            e.preventDefault();
                            this.setSubdivision(4);
                            break;
                    }
                });
            }
        }

        // =============================================
        //  Init
        // =============================================
        const engine = new MetronomeEngine();
        const ui = new UIController(engine);
        window.__metronome = { engine, ui };

        console.log('%c🎵 在线节拍器 v3 (Phase 3) 已就绪',
            'font-size:16px;');

            'color:#4ECB71;','','color:#4ECB71;','','color:#4ECB71;','','color:#4ECB71;');

    })();
