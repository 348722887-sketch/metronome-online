    <script>
    (function() {
        'use strict';

        // =============================================
        //  MetronomeEngine — Web Audio API 音频引擎
        // =============================================
        class MetronomeEngine {
            constructor() {
                this.audioCtx = null;
                this.nextNoteTime = 0;
                this.currentBeat = 0;
                this.tempo = 120;
                this.beatsPerBar = 4;
                this.isPlaying = false;
                this.timerID = null;
                this.lookAhead = 25;       // ms, scheduler check interval
                this.scheduleAhead = 0.1;   // seconds, look-ahead window
                this.accentBuffer = null;
                this.normalBuffer = null;
                this.subBuffer = null;
                this.onBeatCallback = null;  // called on each beat for visual sync
            }

            /**
             * Initialize AudioContext and generate click sound buffers.
             * Must be called from a user gesture (click/keypress).
             */
            initAudio() {
                if (this.audioCtx) return;

                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                this.audioCtx = new AudioCtx();
                this.accentBuffer = this._createClickBuffer(true);
                this.normalBuffer = this._createClickBuffer(false);
                this.subBuffer = this._createClickBuffer(false, 0.4);
            }

            /**
             * Generate a short percussive click in an AudioBuffer.
             * Uses a high-frequency sine + soft noise blended, with fast decay.
             */
            _createClickBuffer(accented, volumeScale = 1.0) {
                const sampleRate = this.audioCtx.sampleRate;
                const duration = accented ? 0.04 : 0.03; // slightly longer for accent
                const length = Math.floor(sampleRate * duration);
                const buffer = this.audioCtx.createBuffer(1, length, sampleRate);
                const data = buffer.getChannelData(0);

                const freq = accented ? 1800 : 1200;
                const amp = (accented ? 0.95 : 0.65) * volumeScale;

                for (let i = 0; i < length; i++) {
                    const t = i / sampleRate;
                    // Fast exponential decay
                    const envelope = Math.exp(-t * (accented ? 90 : 120));
                    // Sine tone
                    const tone = Math.sin(2 * Math.PI * freq * t);
                    // A tiny bit of noise for crispness
                    const noise = (Math.random() * 2 - 1) * 0.15;
                    data[i] = (tone * 0.85 + noise * 0.15) * envelope * amp;
                }

                return buffer;
            }

            /**
             * Play a click from a pre-generated buffer at a precise time.
             */
            _playClick(buffer, time) {
                const src = this.audioCtx.createBufferSource();
                src.buffer = buffer;
                src.connect(this.audioCtx.destination);
                src.start(time);
            }

            /**
             * Advance to the next note in the sequence.
             */
            _nextNote() {
                const secondsPerBeat = 60.0 / this.tempo;
                this.nextNoteTime += secondsPerBeat;
                this.currentBeat = (this.currentBeat + 1) % this.beatsPerBar;
            }

            /**
             * Schedule a single note at the given time.
             */
            _scheduleNote(time, beatNumber) {
                const isAccent = beatNumber === 0;
                this._playClick(isAccent ? this.accentBuffer : this.normalBuffer, time);

                // Fire visual callback
                if (this.onBeatCallback) {
                    const delayMs = Math.max(0, (time - this.audioCtx.currentTime) * 1000);
                    setTimeout(() => {
                        this.onBeatCallback(beatNumber, time);
                    }, delayMs);
                }
            }

            /**
             * The look-ahead scheduler. Called every ~25ms.
             * Schedules all notes that fall within the look-ahead window.
             */
            _scheduler() {
                while (this.nextNoteTime < this.audioCtx.currentTime + this.scheduleAhead) {
                    this._scheduleNote(this.nextNoteTime, this.currentBeat);
                    this._nextNote();
                }
            }

            /**
             * Start playback.
             */
            start() {
                if (!this.audioCtx) {
                    this.initAudio();
                }

                if (this.audioCtx.state === 'suspended') {
                    this.audioCtx.resume();
                }

                if (this.isPlaying) return;

                this.isPlaying = true;
                this.currentBeat = 0;
                // Start the first note slightly in the future for stability
                this.nextNoteTime = this.audioCtx.currentTime + 0.05;

                this._scheduler();
                this.timerID = setInterval(() => this._scheduler(), this.lookAhead);
            }

            /**
             * Stop playback.
             */
            stop() {
                this.isPlaying = false;
                if (this.timerID) {
                    clearInterval(this.timerID);
                    this.timerID = null;
                }
            }

            /**
             * Toggle play/pause.
             */
            toggle() {
                if (this.isPlaying) {
                    this.stop();
                } else {
                    this.start();
                }
                return this.isPlaying;
            }

            /**
             * Set tempo. If playing, the change takes effect on the next
             * scheduled note (since _nextNote recalculates from current tempo).
             */
            setTempo(bpm) {
                this.tempo = Math.max(20, Math.min(300, bpm));
                return this.tempo;
            }

            /**
             * Set beats per bar. Resets beat counter if currently beyond new range.
             */
            setBeatsPerBar(beats) {
                this.beatsPerBar = Math.max(1, Math.min(12, beats));
                if (this.currentBeat >= this.beatsPerBar) {
                    this.currentBeat = 0;
                }
                return this.beatsPerBar;
            }

            /**
             * Cleanup: stop and close audio context.
             */
            destroy() {
                this.stop();
                if (this.audioCtx && this.audioCtx.state !== 'closed') {
                    this.audioCtx.close();
                }
                this.audioCtx = null;
                this.accentBuffer = null;
                this.normalBuffer = null;
            }
        }

                this._bindEvents();
                this._bindKeyboard();
            }

            // ---- BPM ----

            setBpm(val, source = 'ui') {
                const newBpm = Math.max(20, Math.min(300, Math.round(val)));
                if (newBpm === this.bpm) return;

                this.bpm = newBpm;
                this.engine.setTempo(newBpm);

                // Update UI
                this.$bpmDisplay.textContent = newBpm;
                this.$bpmSlider.value = newBpm;
                this._updateBpmLabel();
                this._updateSliderFill();

                // Pop animation
                this.$bpmDisplay.classList.remove('bpm-pop');
                void this.$bpmDisplay.offsetWidth; // reflow
                this.$bpmDisplay.classList.add('bpm-pop');
            }

            setBeatsPerBar(val) {
                const beats = Math.max(1, Math.min(12, Math.round(val)));
                if (beats === this.beatsPerBar) return;

                this.beatsPerBar = beats;
                this.engine.setBeatsPerBar(beats);

                // Update UI
                this.$beatCountInput.value = beats;
                this._updateBeatIndicators();

                // Update preset button active state
                this.$presetBtns.forEach(btn => {
                    const btnBeats = parseInt(btn.dataset.beats);
                    btn.classList.toggle('active', btnBeats === beats);
                });
            }

            _updateBpmLabel() {
                let label = '';
                for (const [min, max, name] of this.tempoLabels) {
                    if (this.bpm >= min && this.bpm < max) {
                        label = name;
                        break;
                    }
                }
                this.$bpmLabel.textContent = label || '';
            }

            _updateSliderFill() {
                const percent = ((this.bpm - 20) / (300 - 20)) * 100;
                this.$bpmSlider.style.setProperty('--fill-percent', percent + '%');
            }

            // ---- Beat Indicators ----

            _updateBeatIndicators() {
                this.$beatIndicators.innerHTML = '';
                for (let i = 0; i < this.beatsPerBar; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'beat-dot' + (i === 0 ? ' accent' : '');
                    dot.setAttribute('data-beat', i);
                    this.$beatIndicators.appendChild(dot);
                }
            }

            highlightBeat(beatNumber) {
                const dots = this.$beatIndicators.querySelectorAll('.beat-dot');
                dots.forEach((dot, i) => {
                    if (i === beatNumber) {
                        dot.classList.add('active');
                        // Auto-remove after short delay so it blinks
                        setTimeout(() => dot.classList.remove('active'), 120);
                    } else {
                        dot.classList.remove('active');
                    }
                });
            }

            // ---- Play State ----

            setPlayingState(playing) {
                if (playing) {
                    this.$playBtn.classList.add('playing');
                    this.$playIcon.textContent = '⏸';
                    this.$bpmDisplay.classList.add('playing');
                } else {
                    this.$playBtn.classList.remove('playing');
                    this.$playIcon.textContent = '▶';
                    this.$bpmDisplay.classList.remove('playing');
                    // Clear beat indicators
                    this.$beatIndicators.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active'));
                }
            }

            // ---- Tap Tempo ----

            handleTap() {
                const now = performance.now();

                // Reset if last tap was > 2 seconds ago
                if (this.tapTimes.length > 0 && (now - this.tapTimes[this.tapTimes.length - 1]) > 2000) {
                    this.tapTimes = [];
                }

                this.tapTimes.push(now);

                // Keep only last 8 taps
                if (this.tapTimes.length > 8) {
                    this.tapTimes.shift();
                }

                // Need at least 2 taps to calculate
                if (this.tapTimes.length >= 2) {
                    const intervals = [];
                    for (let i = 1; i < this.tapTimes.length; i++) {
                        intervals.push(this.tapTimes[i] - this.tapTimes[i - 1]);
                    }

                    // Average interval in ms
                    const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;

                    // Convert to BPM
                    const bpm = Math.round(60000 / avgInterval);
                    if (bpm >= 20 && bpm <= 300) {
                        this.setBpm(bpm);
                    }
                }

                // Visual feedback
                this.$tapBtn.classList.add('tapping');
                clearTimeout(this.tapTimeout);
                this.tapTimeout = setTimeout(() => {
                    this.$tapBtn.classList.remove('tapping');
                }, 300);
            }

            // ---- Event Binding ----

            _bindEvents() {
                // Play / Pause
                this.$playBtn.addEventListener('click', () => {
                    this.engine.initAudio(); // must be in user gesture
                    const playing = this.engine.toggle();
                    this.setPlayingState(playing);
                });

                // Tap Tempo
                this.$tapBtn.addEventListener('click', () => {
                    this.engine.initAudio();
                    this.handleTap();
                });

                // BPM Slider
                this.$bpmSlider.addEventListener('input', () => {
                    this.setBpm(parseInt(this.$bpmSlider.value));
                });

                // BPM Adjustment Buttons
                document.getElementById('bpmUp1').addEventListener('click', () => this.setBpm(this.bpm + 1));
                document.getElementById('bpmDown1').addEventListener('click', () => this.setBpm(this.bpm - 1));
                document.getElementById('bpmUp10').addEventListener('click', () => this.setBpm(this.bpm + 10));
                document.getElementById('bpmDown10').addEventListener('click', () => this.setBpm(this.bpm - 10));

                // BPM Display Click → Input
                this.$bpmDisplay.addEventListener('click', () => this._showBpmInput());
                this.$bpmDisplay.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') this._showBpmInput();
                });

                // Beat Preset Buttons
                this.$presetBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const beats = parseInt(btn.dataset.beats);
                        this.setBeatsPerBar(beats);
                    });
                });

                // Beat Count Input
                this.$beatCountInput.addEventListener('change', () => {
                    const val = parseInt(this.$beatCountInput.value);
                    if (!isNaN(val) && val >= 1 && val <= 12) {
                        this.setBeatsPerBar(val);
                    } else {
                        this.$beatCountInput.value = this.beatsPerBar;
                    }
                });

                // Engine visual beat callback
                this.engine.onBeatCallback = (beatNumber) => {
                    this.highlightBeat(beatNumber);
                };
            }

            _showBpmInput() {
                // Create a temporary input over the BPM display
                const input = document.createElement('input');
                input.type = 'number';
                input.min = 20;
                input.max = 300;
                input.value = this.bpm;
                input.className = 'text-8xl sm:text-9xl font-extrabold text-center bg-transparent border-b-2 border-accent text-white w-full outline-none';
                input.style.cssText = 'font-variant-numeric:tabular-nums; -moz-appearance:textfield;';
                input.setAttribute('inputmode', 'numeric');

                // Replace display with input
                this.$bpmDisplay.replaceWith(input);
                input.focus();
                input.select();

                const commit = () => {
                    const val = parseInt(input.value);
                    if (!isNaN(val)) {
                        this.setBpm(val);
                    }
                    input.replaceWith(this.$bpmDisplay);
                    this.$bpmDisplay.textContent = this.bpm;
                };

                input.addEventListener('blur', commit);
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') { input.blur(); }
                    if (e.key === 'Escape') {
                        input.value = this.bpm;
                        input.blur();
                    }
                });
            }

            // ---- Keyboard Shortcuts ----

            _bindKeyboard() {
                document.addEventListener('keydown', (e) => {
                    // Ignore if typing in an input
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                    switch (e.code) {
                        case 'Space':
                            e.preventDefault();
                            this.engine.initAudio();
                            const playing = this.engine.toggle();
                            this.setPlayingState(playing);
                            break;

                        case 'ArrowUp':
                            e.preventDefault();
                            if (e.shiftKey) {
                                this.setBpm(this.bpm + 10);
                            } else {
                                this.setBpm(this.bpm + 1);
                            }
                            break;

                        case 'ArrowDown':
                            e.preventDefault();
                            if (e.shiftKey) {
                                this.setBpm(this.bpm - 10);
                            } else {
                                this.setBpm(this.bpm - 1);
                            }
                            break;

                        case 'ArrowRight':
                            e.preventDefault();
                            if (e.shiftKey) {
                                this.setBpm(this.bpm + 10);
                            } else {
                                this.setBpm(this.bpm + 1);
                            }
                            break;

                        case 'ArrowLeft':
                            e.preventDefault();
                            if (e.shiftKey) {
                                this.setBpm(this.bpm - 10);
                            } else {
                                this.setBpm(this.bpm - 1);
                            }
                            break;

                        case 'KeyT':
                            e.preventDefault();
                            this.engine.initAudio();
                            this.handleTap();
                            break;
                    }
                });
            }
        }

        // =============================================
        //  App Initialization
        // =============================================
        const engine = new MetronomeEngine();
        const ui = new UIController(engine);

        // Expose for debugging
        window.__metronome = { engine, ui };

        console.log('%c🎵 在线节拍器已就绪 %c| %c120 BPM %c| %c4/4 拍',
            'font-size:16px;', '', 'color:#4F8CFF;', '', 'color:#4F8CFF;');
        console.log('%c空格键播放 · 方向键调BPM · T键测速 · 点击数字直接输入',
            'color:#888;');

    })();
    </script>
</body>
</html>
